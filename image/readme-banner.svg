<svg width="1200" height="400" viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#1e2124"/>
            <stop offset="100%" stop-color="#2c2f33"/>
        </linearGradient>
        <linearGradient id="pathGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#7a942a" stop-opacity="0.2"/>
            <stop offset="30%" stop-color="#97b536" stop-opacity="1"/>
            <stop offset="70%" stop-color="#97b536" stop-opacity="1"/>
            <stop offset="100%" stop-color="#7a942a" stop-opacity="0.2"/>
        </linearGradient>
        <filter id="glow">
            <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>

    <!-- Dark Background -->
    <rect width="1200" height="400" fill="url(#bg)"/>

    <!-- Subtle Grid Background -->
    <path d="M0 50 H1200 M0 100 H1200 M0 150 H1200 M0 200 H1200 M0 250 H1200 M0 300 H1200 M0 350 H1200" stroke="#ffffff" stroke-opacity="0.02" stroke-width="1"/>
    <path d="M100 0 V400 M200 0 V400 M300 0 V400 M400 0 V400 M500 0 V400 M600 0 V400 M700 0 V400 M800 0 V400 M900 0 V400 M1000 0 V400 M1100 0 V400" stroke="#ffffff" stroke-opacity="0.02" stroke-width="1"/>

    <!-- Abstract Mountain Silhouettes -->
    <path d="M0 400 L150 220 L350 340 L600 160 L850 310 L1100 120 L1200 200 L1200 400 Z" fill="#ffffff" fill-opacity="0.015"/>
    <path d="M0 400 L250 280 L450 360 L750 200 L1000 340 L1200 250 L1200 400 Z" fill="#ffffff" fill-opacity="0.025"/>

    <!-- Glowing GPX Track -->
    <path d="M -50 280 C 150 350, 250 150, 400 220 S 650 120, 800 180 S 1050 300, 1250 150" fill="none" stroke="url(#pathGrad)" stroke-width="6" filter="url(#glow)"/>

    <!-- Track Waypoints -->
    <circle cx="400" cy="220" r="7" fill="#1e2124" stroke="#97b536" stroke-width="3"/>
    <circle cx="800" cy="180" r="7" fill="#1e2124" stroke="#97b536" stroke-width="3"/>

    <!-- Main Title -->
    <text x="600" y="185" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="78" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="1">Komoot 2 GPX</text>

    <!-- Subtitles -->
    <text x="600" y="240" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="22" font-weight="600" fill="#97b536" text-anchor="middle" letter-spacing="4">NATIVE PWA EXPORTER</text>
    <text x="600" y="280" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="15" font-weight="500" fill="#888888" text-anchor="middle" letter-spacing="2">MULTI-PROXY ENGINE • SMARTTOUR SUPPORT • SHARE TARGET</text>
</svg>