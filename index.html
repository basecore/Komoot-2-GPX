<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Komoot 2 GPX Exporter</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e2124">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    
    <style>
        :root {
            --bg-color: #f4f4f9;
            --text-color: #333;
            --box-bg: #fff;
            --primary: #97b536;
            --primary-hover: #7a942a;
            --error: #e74c3c;
            --warning: #f39c12;
            --meta-color: #888;
            --debug-bg: #f8f9fa;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #1e2124;
                --text-color: #f4f4f9;
                --box-bg: #2c2f33;
                --meta-color: #aaa;
                --debug-bg: #111;
            }
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .container {
            background-color: var(--box-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
        }
        h1 { margin: 0 0 5px 0; font-size: 24px; text-align: center; }
        
        .meta-info {
            text-align: center;
            font-size: 12px;
            color: var(--meta-color);
            margin-bottom: 25px;
            line-height: 1.4;
        }
        .meta-info a { color: var(--primary); text-decoration: none; font-weight: bold; }
        .meta-info a:hover { text-decoration: underline; }

        input[type="url"] {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
            background-color: var(--bg-color);
            color: var(--text-color);
        }
        button {
            width: 100%;
            padding: 15px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background-color: var(--primary-hover); }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        
        #debug-console {
            margin-top: 15px;
            padding: 10px;
            background-color: var(--debug-bg);
            border: 1px solid #ddd;
            border-radius: 6px;
            font-family: monospace;
            font-size: 12px;
            height: 180px;
            overflow-y: auto;
            word-wrap: break-word;
        }
        .log-info { color: #3498db; }
        .log-success { color: var(--primary); font-weight: bold; }
        .log-error { color: var(--error); font-weight: bold; }
        
        #map-container {
            width: 100%;
            height: 250px;
            margin-top: 20px;
            border-radius: 8px;
            overflow: hidden;
            display: none;
            border: 2px solid var(--primary);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Komoot 2 GPX</h1>
    
    <div class="meta-info">
        v1.3.0 | Proxy Bugfix | 28.04.2026 | by basecore<br>
        Projekt auf <a href="https://github.com/basecore/Komoot-2-GPX/" target="_blank">GitHub</a> ansehen
    </div>
    
    <input type="url" id="tourUrl" placeholder="Link einfügen (z.B. komoot.de/tour/123)" autocomplete="off">
    <button id="downloadBtn" onclick="processTour()">Vorschau & GPX Laden</button>
    
    <!-- Die Konsole ist nun immer sichtbar für garantierte Logs -->
    <div id="debug-console">
        <div class="log-info">[Bereit] Warte auf URL Eingabe...</div>
    </div>
    
    <div id="map-container"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js').catch(err => console.log('SW setup failed', err));
        });
    }

    let map = null;
    let trackLayer = null;

    function logMsg(message, type = 'info') {
        const consoleDiv = document.getElementById('debug-console');
        const span = document.createElement('div');
        span.className = `log-${type}`;
        const time = new Date().toLocaleTimeString();
        span.innerText = `[${time}] ${message}`;
        consoleDiv.appendChild(span);
        consoleDiv.scrollTop = consoleDiv.scrollHeight;
    }

    function clearLog() {
        const consoleDiv = document.getElementById('debug-console');
        consoleDiv.innerHTML = '<div class="log-info">[Bereit] Neuer Start...</div>';
    }

    function renderMap(coords) {
        try {
            logMsg("Initialisiere Leaflet Karte...", "info");
            const mapDiv = document.getElementById('map-container');
            mapDiv.style.display = 'block';

            if (!map) {
                map = L.map('map-container');
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: '&copy; OpenStreetMap'
                }).addTo(map);
            }

            if (trackLayer) map.removeLayer(trackLayer);

            const latLngs = coords.map(pt => [pt.lat, pt.lng]);
            trackLayer = L.polyline(latLngs, { color: '#97b536', weight: 4 }).addTo(map);
            map.fitBounds(trackLayer.getBounds());
            
            setTimeout(() => { map.invalidateSize(); }, 100);
            logMsg("Karte erfolgreich gerendert.", "success");
        } catch (e) {
            logMsg(`Karten-Fehler: ${e.message}`, "error");
        }
    }

    // SICHERER ALLORIGINS PROXY FETCH FUNKTION
    async function fetchViaProxy(url) {
        // allorigins.win wickelt die JSON Antwort sicher in ein neues JSON Objekt unter 'contents'
        const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
        logMsg(`Frage Proxy an für: ${url.split('/').pop()}`, "info");
        
        const response = await fetch(proxyUrl);
        if (!response.ok) throw new Error(`Proxy Netzwerk-Status: ${response.status}`);
        
        const proxyData = await response.json();
        
        // Prüfen, ob die eingewickelte Antwort reines HTML ist (Captchas etc.)
        if (proxyData.contents.trim().startsWith("<!DOCTYPE") || proxyData.contents.trim().startsWith("<html")) {
             throw new Error(`API hat HTML statt JSON gesendet. Tour evt. privat oder Proxy blockiert.`);
        }
        
        // Echtes JSON auspacken
        return JSON.parse(proxyData.contents);
    }

    async function processTour() {
        const urlInput = document.getElementById('tourUrl').value.trim();
        const btn = document.getElementById('downloadBtn');
        const mapDiv = document.getElementById('map-container');
        
        clearLog();
        mapDiv.style.display = 'none';
        
        if (!urlInput) {
            logMsg("Abbruch: Keine URL eingegeben.", "error");
            return;
        }

        btn.disabled = true;
        btn.innerText = "Verarbeite...";

        try {
            logMsg("Prüfe URL-Format...", "info");
            const match = urlInput.match(/(?:tour|smarttour)/(d+)/);
            if (!match) throw new Error("URL enthält keine gültige ID (tour/123 oder smarttour/123).");
            
            const tourId = match[1];
            const isSmartTour = urlInput.includes('/smarttour/');
            logMsg(`Erkannt: ${isSmartTour ? 'Smarttour' : 'Normale Tour'} (ID: ${tourId})`, "success");
            
            let tourApiUrl, coordsApiUrl;

            // BUGFIX FÜR KOMOOT ROUTING
            if (isSmartTour) {
                tourApiUrl = `https://api.komoot.de/v007/discover_tours/${tourId}`;
                coordsApiUrl = `https://api.komoot.de/v007/smart_tours/${tourId}/coordinates`;
            } else {
                tourApiUrl = `https://api.komoot.de/v007/tours/${tourId}`;
                coordsApiUrl = `https://api.komoot.de/v007/tours/${tourId}/coordinates`;
            }

            // SICHERER ABRUF ÜBER NEUEN PROXY
            logMsg(`Schritt 1: Lade Metadaten...`, "info");
            const tourData = await fetchViaProxy(tourApiUrl);
            logMsg(`Metadaten empfangen!`, "success");

            logMsg(`Schritt 2: Lade Koordinaten...`, "info");
            const coordsData = await fetchViaProxy(coordsApiUrl);
            
            if (!coordsData.items || coordsData.items.length === 0) {
                throw new Error("API meldet Erfolg, aber keine GPS-Punkte vorhanden.");
            }
            logMsg(`Koordinaten empfangen! (${coordsData.items.length} Wegpunkte)`, "success");

            renderMap(coordsData.items);

            const tourName = tourData.name || tourData.title || `Komoot_${isSmartTour ? 'Smarttour' : 'Tour'}_${tourId}`;
            logMsg(`Schritt 3: Generiere GPX...`, "info");
            generateAndDownloadGPX(tourName, coordsData.items);
            
            logMsg("Fertig! GPX Download erfolgreich initiiert.", "success");
            btn.innerText = "Erfolgreich!";
            setTimeout(() => { btn.innerText = "Vorschau & GPX Laden"; }, 3000);
            
        } catch (error) {
            logMsg(`FEHLER ABBRUCH: ${error.message}`, "error");
            btn.innerText = "Fehler aufgetreten";
            setTimeout(() => { btn.innerText = "Vorschau & GPX Laden"; }, 3000);
        } finally {
            btn.disabled = false;
        }
    }

    function generateAndDownloadGPX(name, items) {
        try {
            const safeName = name.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            
            let gpx = `<?xml version="1.0" encoding="UTF-8"?>
`;
            gpx += `<gpx version="1.1" creator="Komoot Web PWA by basecore" xmlns="http://www.topografix.com/GPX/1/1">
`;
            gpx += `  <trk>
    <name>${safeName}</name>
    <trkseg>
`;

            items.forEach(pt => {
                gpx += `      <trkpt lat="${pt.lat}" lon="${pt.lng}">
`;
                if (pt.alt !== undefined) gpx += `        <ele>${pt.alt}</ele>
`;
                if (pt.t) gpx += `        <time>${new Date(pt.t).toISOString()}</time>
`;
                gpx += `      </trkpt>
`;
            });

            gpx += `    </trkseg>
  </trk>
</gpx>`;

            const blob = new Blob([gpx], { type: "application/gpx+xml" });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            const safeFilename = name.replace(/[^a-z0-9äöüß]/gi, '_').toLowerCase();
            link.download = `${safeFilename}.gpx`;
            
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            logMsg("Download Datei wurde im Browser erzeugt.", "success");
            
        } catch (e) {
            throw new Error(`GPX-Generierung fehlgeschlagen: ${e.message}`);
        }
    }
</script>
</body>
</html>
