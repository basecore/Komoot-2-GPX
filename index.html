<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Komoot 2 GPX Exporter</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    
    <style>
        :root {
            --bg-color: #f4f4f9; --text-color: #333; --box-bg: #fff;
            --primary: #97b536; --primary-hover: #7a942a;
            --error: #e74c3c; --warning: #f39c12; --debug-bg: #111; --debug-text: #0f0;
        }
        @media (prefers-color-scheme: dark) {
            :root { --bg-color: #1e2124; --text-color: #f4f4f9; --box-bg: #2c2f33; }
        }
        body { font-family: sans-serif; background: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px; }
        .container { background: var(--box-bg); padding: 20px; border-radius: 12px; max-width: 600px; margin: 0 auto; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { text-align: center; margin-top: 0; }
        
        input[type="url"] { width: 100%; padding: 15px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; background: var(--bg-color); color: var(--text-color); font-size: 16px;}
        button { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; }
        button:disabled { background: #555; }
        
        /* Neues gigantisches Konsolen-Design */
        #debug-console {
            margin-top: 20px; padding: 10px; background: var(--debug-bg); color: #fff;
            border-radius: 6px; font-family: monospace; font-size: 12px; height: 300px; 
            overflow-y: auto; word-break: break-all; border: 2px solid #555;
        }
        .log-info { color: #88ccff; }
        .log-success { color: #00ff00; font-weight: bold; }
        .log-warning { color: #ffaa00; }
        .log-error { color: #ff3333; font-weight: bold; background: rgba(255,0,0,0.1); padding: 2px; }
        .log-system { color: #ff00ff; }
        
        #map-container { width: 100%; height: 250px; margin-top: 20px; border-radius: 8px; display: none; border: 2px solid var(--primary); }
    </style>
</head>
<body>

<div class="container">
    <h1>Komoot 2 GPX (v1.5)</h1>
    <p style="text-align:center; font-size:12px; opacity:0.7;">Multi-Proxy Fallback & Hardcore Debugging</p>
    
    <input type="url" id="tourUrl" placeholder="Link einfügen (z.B. komoot.de/tour/123)" autocomplete="off">
    <button id="downloadBtn" onclick="startProcess()">Vorschau & GPX Laden</button>
    
    <div id="debug-console">
        <div class="log-system">=== SYSTEM START ===</div>
    </div>
    
    <div id="map-container"></div>
</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

<script>
    // ==========================================
    // 1. GLOBALER FEHLER-FÄNGER (Lebenswichtig!)
    // ==========================================
    window.onerror = function(msg, url, lineNo, columnNo, error) {
        logMsg(`[CRASH] Browser meldet Fehler: ${msg} (Zeile ${lineNo})`, "error");
        return false;
    };

    window.addEventListener('unhandledrejection', function(event) {
        logMsg(`[PROMISE CRASH] Unerwarteter Abbruch: ${event.reason}`, "error");
    });

    // ==========================================
    // 2. LOGGING SYSTEM
    // ==========================================
    function logMsg(message, type = 'info') {
        const consoleDiv = document.getElementById('debug-console');
        if(!consoleDiv) return;
        const time = new Date().toISOString().split('T')[1].substring(0,8);
        consoleDiv.innerHTML += `<div class="log-${type}">[${time}] ${message}</div>`;
        consoleDiv.scrollTop = consoleDiv.scrollHeight;
    }

    // ==========================================
    // 3. MULTI-PROXY FALLBACK ENGINE
    // ==========================================
    // Wir definieren 4 verschiedene Proxys. Das Script testet sie der Reihe nach durch.
    const PROXY_LIST = [
        { name: "cors.lol", makeUrl: (u) => `https://api.cors.lol/?url=${encodeURIComponent(u)}` },
        { name: "allorigins", makeUrl: (u) => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}` },
        { name: "corsproxy.io", makeUrl: (u) => `https://corsproxy.io/?${encodeURIComponent(u)}` },
        { name: "codetabs", makeUrl: (u) => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}` }
    ];

    async function fetchWithFallbacks(targetUrl, stepName) {
        logMsg(`--- STARTE FETCH ROUTINE: ${stepName} ---`, "system");
        logMsg(`Original Ziel: ${targetUrl}`, "info");

        let lastError = "Unbekannt";

        for (let i = 0; i < PROXY_LIST.length; i++) {
            const proxy = PROXY_LIST[i];
            logMsg(`>>> Versuche Proxy ${i+1}/${PROXY_LIST.length} (${proxy.name})`, "info");
            
            try {
                const proxyUrl = proxy.makeUrl(targetUrl);
                const response = await fetch(proxyUrl, { headers: { 'Accept': 'application/json' }, cache: 'no-store' });
                
                if (!response.ok) {
                    throw new Error(`HTTP Status ${response.status}`);
                }

                const text = await response.text();
                
                // Blockiert der Proxy oder liefert Komoot eine Captcha-Webseite?
                if (text.trim().startsWith('<')) {
                    throw new Error("Antwort ist HTML (Proxy blockiert oder Captcha).");
                }

                // Versuche JSON zu parsen
                const data = JSON.parse(text);
                logMsg(`[ERFOLG] Daten via ${proxy.name} empfangen!`, "success");
                return data; // Wenn erfolgreich, springe aus der Funktion

            } catch (err) {
                logMsg(`[FEHLER] Proxy ${proxy.name} gescheitert: ${err.message}`, "warning");
                lastError = err.message;
            }
        }

        // Wenn die Schleife hier ankommt, haben ALLE Proxys versagt
        throw new Error(`Alle ${PROXY_LIST.length} Proxys haben blockiert. Letzter Fehler: ${lastError}`);
    }

    // ==========================================
    // 4. HAUPTPROZESS (Sicher gekapselt)
    // ==========================================
    function startProcess() {
        logMsg("==========================", "system");
        logMsg("Button geklickt! Starte Prozess.", "info");
        
        // Asynchronen Prozess starten und Fehler fangen
        processTourAsync().catch(err => {
            logMsg(`TOTALAUSFALL: ${err.message}`, "error");
            document.getElementById('downloadBtn').innerText = "Fehler!";
            document.getElementById('downloadBtn').disabled = false;
        });
    }

    async function processTourAsync() {
        const urlInput = document.getElementById('tourUrl').value.trim();
        const btn = document.getElementById('downloadBtn');
        const mapDiv = document.getElementById('map-container');
        
        mapDiv.style.display = 'none';

        if (!urlInput) {
            logMsg("Input-Feld ist leer.", "error");
            return;
        }

        btn.disabled = true;
        btn.innerText = "Arbeite...";

        // 1. URL ANALYSE
        logMsg("Analysiere eingegebene URL...", "info");
        const match = urlInput.match(/(?:tour|smarttour)/(d+)/);
        if (!match) {
            throw new Error("Regex gescheitert. Keine gültige Tour-ID (z.B. /tour/123 oder /smarttour/123) in URL gefunden.");
        }
        
        const tourId = match[1];
        const isSmartTour = urlInput.includes('/smarttour/');
        logMsg(`Erkannt: ${isSmartTour ? 'SMARTTOUR' : 'NORMALE TOUR'} mit ID: ${tourId}`, "success");
        
        // 2. ENDPUNKTE DEFINIEREN
        let tourApiUrl = isSmartTour 
            ? `https://api.komoot.de/v007/discover_tours/${tourId}` 
            : `https://api.komoot.de/v007/tours/${tourId}`;
            
        let coordsApiUrl = isSmartTour 
            ? `https://api.komoot.de/v007/smart_tours/${tourId}/coordinates` 
            : `https://api.komoot.de/v007/tours/${tourId}/coordinates`;

        // 3. DATEN LADEN (Mit der neuen Fallback-Routine)
        const tourData = await fetchWithFallbacks(tourApiUrl, "Metadaten");
        const tourName = tourData.name || tourData.title || `Komoot_${tourId}`;
        logMsg(`Tourname extrahiert: "${tourName}"`, "success");

        const coordsData = await fetchWithFallbacks(coordsApiUrl, "Koordinaten");
        
        if (!coordsData.items || !Array.isArray(coordsData.items) || coordsData.items.length === 0) {
            throw new Error("Daten geladen, aber 'items' Array mit Koordinaten ist leer oder fehlt.");
        }
        logMsg(`Gefundene GPS-Punkte: ${coordsData.items.length}`, "success");

        // 4. KARTE RENDERN
        logMsg("Initialisiere Leaflet...", "info");
        try {
            mapDiv.style.display = 'block';
            if (!window.mapInstance) {
                window.mapInstance = L.map('map-container');
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(window.mapInstance);
            }
            if (window.trackLayer) window.mapInstance.removeLayer(window.trackLayer);

            const latLngs = coordsData.items.map(pt => [pt.lat, pt.lng]);
            window.trackLayer = L.polyline(latLngs, { color: '#97b536', weight: 4 }).addTo(window.mapInstance);
            window.mapInstance.fitBounds(window.trackLayer.getBounds());
            setTimeout(() => { window.mapInstance.invalidateSize(); }, 200);
            logMsg("Karte gezeichnet.", "success");
        } catch(err) {
            logMsg(`Karten-Fehler (wird übersprungen): ${err.message}`, "warning");
        }

        // 5. GPX ERSTELLEN
        logMsg("Erstelle GPX XML-Struktur...", "info");
        generateAndDownloadGPX(tourName, coordsData.items);
        
        logMsg("Vorgang komplett abgeschlossen!", "success");
        btn.innerText = "Erfolg!";
        setTimeout(() => { btn.disabled = false; btn.innerText = "Vorschau & GPX Laden"; }, 3000);
    }

    function generateAndDownloadGPX(name, items) {
        const safeName = name.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        let gpx = `<?xml version="1.0" encoding="UTF-8"?>
<gpx version="1.1" creator="Komoot2GPX" xmlns="http://www.topografix.com/GPX/1/1">
  <trk>
    <name>${safeName}</name>
    <trkseg>
`;

        items.forEach(pt => {
            gpx += `      <trkpt lat="${pt.lat}" lon="${pt.lng}">
`;
            if (pt.alt !== undefined) gpx += `        <ele>${pt.alt}</ele>
`;
            if (pt.t) gpx += `        <time>${new Date(pt.t).toISOString()}</time>
`;
            gpx += `      </trkpt>
`;
        });
        gpx += `    </trkseg>
  </trk>
</gpx>`;

        logMsg("GPX erstellt, starte Datei-Download...", "info");
        const blob = new Blob([gpx], { type: "application/gpx+xml" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `${name.replace(/[^a-z0-9äöüß]/gi, '_').toLowerCase()}.gpx`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    logMsg("System einsatzbereit. Warte auf Eingabe...", "info");
</script>
</body>
</html>
