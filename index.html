<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Komoot 2 GPX Exporter</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="image/icon-192.png">
    <meta name="theme-color" content="#1e2124">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #121416; --card-bg: #1e2124; --input-bg: #2c2f33;
            --text-main: #ffffff; --text-muted: #a0a5a9;
            --primary: #97b536; --primary-hover: #86a32d;
            --install: #3498db; --install-hover: #2980b9;
            --console-bg: #0d0f11; --border-radius: 16px;
        }
        * { box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px; min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; }
        .container { background: var(--card-bg); padding: 30px; border-radius: var(--border-radius); width: 100%; max-width: 550px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.05); margin-top: 2vh; }
        .header-wrapper { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 5px; }
        .app-logo { width: 42px; height: 42px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        h1 { margin: 0; font-size: 26px; font-weight: 800; letter-spacing: -0.5px; }
        .meta-header { text-align: center; font-size: 13px; color: var(--text-muted); margin-bottom: 25px; font-weight: 400; }
        .meta-header a { color: var(--primary); text-decoration: none; font-weight: 600; transition: color 0.2s;}
        .meta-header a:hover { color: #ffffff; }
        
        button { width: 100%; padding: 16px; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); font-family: inherit; }
        button svg { width: 20px; height: 20px; fill: currentColor; }
        
        #installAppBtn { background: var(--install); color: white; margin-bottom: 20px; display: none; box-shadow: 0 4px 15px rgba(52, 152, 219, 0.3); }
        #installAppBtn:hover { background: var(--install-hover); transform: translateY(-2px); }
        
        .main-btn { background: var(--primary); color: white; box-shadow: 0 4px 15px rgba(151, 181, 54, 0.2); }
        .main-btn:hover:not(:disabled) { background: var(--primary-hover); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(151, 181, 54, 0.4); }
        .main-btn:disabled { background: #444; color: #888; cursor: not-allowed; box-shadow: none; transform: none; }
        
        .input-group { position: relative; margin-bottom: 15px; }
        input[type="url"] { width: 100%; padding: 16px 16px 16px 45px; border: 2px solid transparent; border-radius: 12px; background: var(--input-bg); color: white; font-size: 15px; font-family: inherit; outline: none; transition: all 0.2s ease; }
        input[type="url"]::placeholder { color: #666; }
        input[type="url"]:focus { border-color: var(--primary); background: #232528; }
        .input-icon { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); width: 18px; height: 18px; fill: #666; pointer-events: none; }
        input[type="url"]:focus + .input-icon { fill: var(--primary); }
        
        #debug-console { margin-top: 25px; padding: 15px; background: var(--console-bg); border-radius: 10px; font-family: 'Courier New', Courier, monospace; font-size: 12px; height: 200px; overflow-y: auto; border: 1px solid rgba(255,255,255,0.05); box-shadow: inset 0 2px 10px rgba(0,0,0,0.5); line-height: 1.6; }
        .log-links { margin-top: 12px; display: flex; gap: 12px; flex-wrap: wrap; }
        .log-links a { color: var(--primary); text-decoration: none; font-size: 13px; font-weight: 600; }
        .log-links a:hover { color: #ffffff; }
        #debug-console::-webkit-scrollbar { width: 6px; }
        #debug-console::-webkit-scrollbar-track { background: transparent; }
        #debug-console::-webkit-scrollbar-thumb { background: #444; border-radius: 10px; }
        #debug-console::-webkit-scrollbar-thumb:hover { background: #666; }
        
        .log-info { color: #8bb4e7; }
        .log-file { color: #3498db; background: rgba(52, 152, 219, 0.1); padding: 5px 8px; border-radius: 4px; display: inline-block; margin: 4px 0; border-left: 3px solid #3498db; }
        .log-success { color: #97b536; font-weight: bold; background: rgba(151,181,54,0.15); padding: 4px 8px; border-radius: 4px; border-left: 3px solid #97b536; display: inline-block; margin: 4px 0;}
        .log-warning { color: #f1c40f; opacity: 0.8; margin-bottom: 5px; }
        .log-error { color: #ff5252; font-weight: bold; }
        .log-system { color: #bd93f9; font-weight: bold; margin-bottom: 5px; border-bottom: 1px dashed rgba(189, 147, 249, 0.3); padding-bottom: 3px;}
        .log-meta { color: #e67e22; font-style: italic; margin-left: 10px;}
        
        #map-container { width: 100%; height: 250px; margin-top: 20px; border-radius: 12px; display: none; border: 2px solid rgba(255,255,255,0.1); opacity: 0; transition: opacity 0.5s ease; box-shadow: 0 5px 15px rgba(0,0,0,0.3); z-index: 1; }
        #map-container.visible { opacity: 1; display: block; }
    </style>

    <script>
        window.onerror = function(msg, url, line) {
            var log = document.getElementById('debug-console');
            if (log) log.innerHTML += '<div class="log-error">[CRASH] Line ' + line + ': ' + msg + '</div>';
            return false;
        };

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(function(err) { console.log('SW Error:', err); });
        }
    </script>
</head>
<body>

<div class="container">
    <div class="header-wrapper">
        <img src="image/icon-512.png" alt="Logo" class="app-logo" onerror="this.style.display='none'">
        <h1>Komoot 2 GPX</h1>
    </div>
    <div class="meta-header">
        v3.9 Pro (Smart Bypass) | Built by <a href="https://github.com/basecore/Komoot-2-GPX" target="_blank">basecore</a> | May 10, 2026
    </div>
    
    <button type="button" id="installAppBtn">
        <svg viewBox="0 0 24 24"><path d="M17 1.01L7 .99C5.9 .99 5 1.9 5 3v18c0 1.1.9 2 2 2h10c1.1 0 2-.9 2-2V3c0-1.1-.9-1.99-2-1.99zM17 19H7V5h10v14zm-1 2H8v-1h8v1z"/></svg>
        Install App on Device
    </button>
    
    <div class="input-group">
        <input type="url" id="tourUrl" placeholder="Paste Komoot URL (e.g. komoot.de/tour/123)" autocomplete="off">
        <svg class="input-icon" viewBox="0 0 24 24"><path d="M3.9 12c0-1.71 1.39-3.1 3.1-3.1h4V7H7c-2.76 0-5 2.24-5 5s2.24 5 5 5h4v-1.9H7c-1.71 0-3.1-1.39-3.1-3.1 h-4V17h4c2.76 0 5-2.24 5-5s-2.24-5-5-5z"/></svg>
    </div>

    <button type="button" id="downloadBtn" class="main-btn">
        <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
        Preview & Download GPX
    </button>
    
    <div id="debug-console">
        <div class="log-system">user@komoot-exporter:~$ init engine</div>
        <div class="log-info">> System ready. Share API active.</div>
    </div>
    <div class="log-links">
        <a href="https://github.com/basecore/Komoot-2-GPX" target="_blank" rel="noopener noreferrer">Github Project</a>
        <a href="https://github.com/basecore/Komoot-2-GPX/issues" target="_blank" rel="noopener noreferrer">Issues</a>
    </div>
    
    <div id="map-container"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

<script>
    var map = null;
    var trackLayer = null;
    var poiLayerGroup = null;

    let deferredPrompt;
    const installBtn = document.getElementById('installAppBtn');

    window.addEventListener('beforeinstallprompt', function(e) {
        e.preventDefault();
        deferredPrompt = e;
        installBtn.style.display = 'flex';
    });

    installBtn.addEventListener('click', async function() {
        if (deferredPrompt !== null) {
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            deferredPrompt = null;
            installBtn.style.display = 'none';
        }
    });

    window.addEventListener('appinstalled', function() {
        installBtn.style.display = 'none';
    });

    function logMsg(message, type) {
        if (!type) type = 'info';
        var consoleDiv = document.getElementById('debug-console');
        if (!consoleDiv) return;
        var time = new Date().toTimeString().split(' ')[0];
        
        var isBlock = (type === 'success' || type === 'file');
        var wrapStart = isBlock ? '<div style="width:100%">' : '';
        var wrapEnd = isBlock ? '</div>' : '';
        
        consoleDiv.innerHTML += wrapStart + '<div class="log-' + type + '"><span style="opacity:0.5">[' + time + ']</span> ' + message + '</div>' + wrapEnd;
        consoleDiv.scrollTop = consoleDiv.scrollHeight;
    }

    var PROXY_LIST = [
        { name: "Direct API", type: "raw", url: function(u) { return u; } },
        { name: "allorigins (Wrapped)", type: "wrapper", url: function(u) { return 'https://api.allorigins.win/get?url=' + encodeURIComponent(u); } },
        { name: "corsproxy.io", type: "raw", url: function(u) { return 'https://corsproxy.io/?' + encodeURIComponent(u); } },
        { name: "cors.sh", type: "raw", url: function(u) { return 'https://proxy.cors.sh/' + u; } },
        { name: "codetabs", type: "raw", url: function(u) { return 'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(u); } },
        { name: "cors.x2u.in", type: "raw", url: function(u) { return 'https://cors.x2u.in/?' + encodeURIComponent(u); } }
    ];

    async function fetchWithFallbacks(targetUrl, contextName) {
        logMsg('Fetching ' + contextName + '...', "system");
        var lastError = "";

        for (var i = 0; i < PROXY_LIST.length; i++) {
            var proxy = PROXY_LIST[i];
            var proxyUrl = proxy.url(targetUrl);
            logMsg('> Trying ' + proxy.name + '...', "info");
            
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(function() { controller.abort(); }, 12000); 

                var reqHeaders = { 'Accept': 'application/hal+json, application/json, */*' };
                if (proxy.name === 'cors.sh') reqHeaders['x-cors-api-key'] = 'temp_81f0b093380c2f8f8ed97405d4142f74';

                var response = await fetch(proxyUrl, { 
                    headers: reqHeaders, 
                    cache: 'no-store',
                    signal: controller.signal
                });
                
                clearTimeout(timeoutId);

                if (!response.ok) throw new Error('HTTP ' + response.status);
                
                var data;
                if (proxy.type === "wrapper") {
                    var wrapper = await response.json();
                    if (!wrapper.contents) throw new Error("Empty wrapper contents");
                    data = JSON.parse(wrapper.contents);
                } else {
                    var text = await response.text();
                    if (text.trim().startsWith('<')) throw new Error("Blocked (Returned HTML)");
                    data = JSON.parse(text);
                }
                
                logMsg('⭐ SUCCESS! ' + contextName + ' loaded via ' + proxy.name + ' ⭐', "success");
                return data;

            } catch (err) {
                var errMsg = err.name === 'AbortError' ? "Timeout (>12s)" : err.message;
                logMsg('× ' + proxy.name + ' failed: ' + errMsg, "warning");
                lastError = errMsg;
            }
        }
        throw new Error('All routes dead. Last error: ' + lastError);
    }

    function renderMap(coords, pois) {
        try {
            var mapDiv = document.getElementById('map-container');
            mapDiv.classList.add('visible');
            
            if (!map) {
                map = L.map('map-container');
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            }
            
            if (trackLayer) map.removeLayer(trackLayer);
            if (poiLayerGroup) map.removeLayer(poiLayerGroup);
            
            poiLayerGroup = L.layerGroup().addTo(map);

            var latLngs = [];
            for (var i = 0; i < coords.length; i++) latLngs.push([coords[i].lat, coords[i].lng]);

            trackLayer = L.polyline(latLngs, { color: '#97b536', weight: 4, lineCap: 'round', lineJoin: 'round' }).addTo(map);
            map.fitBounds(trackLayer.getBounds());
            
            if (pois && pois.length > 0) {
                for (var j = 0; j < pois.length; j++) {
                    var poi = pois[j];
                    var poiLat = poi.location ? poi.location.lat : poi.lat;
                    var poiLng = poi.location ? poi.location.lng : poi.lng;
                    var poiName = poi.name || poi.title || "Highlight";
                    
                    if (poiLat && poiLng) {
                        var marker = L.circleMarker([poiLat, poiLng], {
                            radius: 6,
                            fillColor: "#e67e22",
                            color: "#fff",
                            weight: 2,
                            opacity: 1,
                            fillOpacity: 1
                        });
                        
                        marker.bindPopup("<b>" + poiName + "</b>");
                        marker.on('mouseover', function(e) { this.openPopup(); });
                        
                        poiLayerGroup.addLayer(marker);
                    }
                }
            }

            setTimeout(function() { map.invalidateSize(); }, 300);
            logMsg("Map rendering complete", "info");
        } catch(e) {
            logMsg('Map Error: ' + e.message, "error");
        }
    }

    function escapeXml(unsafe) {
        return (unsafe || "").toString().replace(/[<>&'"]/g, function (c) {
            switch (c) {
                case '<': return '&lt;';
                case '>': return '&gt;';
                case '&': return '&amp;';
                case '\'': return '&apos;';
                case '"': return '&quot;';
            }
        });
    }

    function generateGPX(name, items, distance, pois, tourData) {
        var distKm = distance ? (distance / 1000).toFixed(2) + " km" : "Unknown length";
        logMsg('Compiling GPX...', "system");
        logMsg('Stats: ' + items.length + ' pts | ' + distKm, "info");
        
        var safeName = escapeXml(name);
        var filename = name.replace(/[^a-z0-9äöüß]/gi, '_').toLowerCase() + '.gpx';
        
        var lines = [];
        lines.push('<?xml version="1.0" encoding="UTF-8"?>');
        lines.push('<gpx version="1.1" creator="Komoot2GPX" xmlns="http://www.topografix.com/GPX/1/1">');
        
        lines.push('  <metadata>');
        lines.push('    <name>' + safeName + '</name>');
        
        var hasDescription = false;
        if (tourData && tourData.description) {
            lines.push('    <desc>' + escapeXml(tourData.description) + '</desc>');
            hasDescription = true;
        }
        lines.push('  </metadata>');

        var poiCount = 0;
        if (pois && pois.length > 0) {
            for (var j = 0; j < pois.length; j++) {
                var poi = pois[j];
                var poiLat = poi.location ? poi.location.lat : poi.lat;
                var poiLng = poi.location ? poi.location.lng : poi.lng;
                var poiName = poi.name || poi.title || "Highlight";
                var poiDesc = poi.description || "";

                if (poiLat && poiLng) {
                    lines.push('  <wpt lat="' + poiLat + '" lon="' + poiLng + '">');
                    lines.push('    <name>' + escapeXml(poiName) + '</name>');
                    if (poiDesc) lines.push('    <desc>' + escapeXml(poiDesc) + '</desc>');
                    lines.push('    <sym>Generic</sym>');
                    lines.push('  </wpt>');
                    poiCount++;
                }
            }
        }

        lines.push('  <trk><name>' + safeName + '</name><trkseg>');
        for (var i = 0; i < items.length; i++) {
            var pt = items[i];
            lines.push('      <trkpt lat="' + pt.lat + '" lon="' + pt.lng + '">');
            if (pt.alt !== undefined) lines.push('        <ele>' + pt.alt + '</ele>');
            if (pt.t) lines.push('        <time>' + new Date(pt.t).toISOString() + '</time>');
            lines.push('      </trkpt>');
        }
        
        lines.push('    </trkseg></trk></gpx>');
        var gpxString = lines.join(String.fromCharCode(10));

        try {
            var blob = new Blob([gpxString], { type: "application/gpx+xml" });
            
            var link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = filename;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            
            logMsg("Download completed successfully!", "success");
            logMsg("File saved to folder: Downloads/" + filename, "file");
            logMsg("--- Integrierte Metadaten in GPX ---", "info");
            if (hasDescription) {
                logMsg("↳ Tour-Beschreibung: Ja", "meta");
            } else {
                logMsg("↳ Tour-Beschreibung: Nein", "meta");
            }
            if (poiCount > 0) {
                logMsg("↳ POIs / Highlights: " + poiCount + " Stück hinzugefügt", "meta");
            } else {
                logMsg("↳ POIs / Highlights: Keine gefunden", "meta");
            }

        } catch(e) {
            logMsg('Download Error: ' + e.message, "error");
        }
    }

    async function startExport() {
        var urlInput = document.getElementById('tourUrl').value.trim();
        var btn = document.getElementById('downloadBtn');
        var consoleDiv = document.getElementById('debug-console');
        var mapDiv = document.getElementById('map-container');

        consoleDiv.innerHTML = '<div class="log-system">user@komoot-exporter:~$ start --url</div>';
        mapDiv.classList.remove('visible');

        if (!urlInput) { logMsg("Error: Please provide a URL", "error"); return; }

        btn.disabled = true;
        btn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46C19.54 15.03 20 13.57 20 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 7.74C4.46 8.97 4 10.43 4 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z"/></svg> Processing...';

        try {
            var tourId = ""; var isSmartTour = false;

            if (urlInput.indexOf("/smarttour/") > -1) {
                isSmartTour = true;
                tourId = urlInput.split("/smarttour/")[1].split("?")[0].split("/")[0].split("#")[0];
            } else if (urlInput.indexOf("/tour/") > -1) {
                isSmartTour = false;
                tourId = urlInput.split("/tour/")[1].split("?")[0].split("/")[0].split("#")[0];
            }

            if (tourId === "") throw new Error("Invalid URL format");
            logMsg('Target: ID ' + tourId + ' (' + (isSmartTour ? 'Smart' : 'Standard') + ')', "info");
            
            var tourApiUrl = isSmartTour ? 'https://www.komoot.de/api/v007/discover_tours/' + tourId : 'https://www.komoot.de/api/v007/tours/' + tourId;

            // 1. Hole Metadaten
            var tourData = await fetchWithFallbacks(tourApiUrl, "Metadata");
            
            if (tourData.error) {
                if (tourData.error === "AccessDenied" || tourData.error === "PrivateTour") {
                     logMsg("NOTICE: This tour is PRIVATE. If it's your own tour, please download it manually via the Komoot website or Komoot app.", "warning");
                     throw new Error("Access Denied: This tour is set to PRIVATE.");
                }
                throw new Error("API Error: " + tourData.error);
            }

            var tourName = tourData.name || tourData.title || 'Komoot_Tour_' + tourId;
            var tourDistance = tourData.distance || 0; 
            
            // 2. Hole Koordinaten - SMART TOUR 403 BYPASS
            var coordsDataItems = [];
            var trueNumericTourId = tourId; 
            
            if (isSmartTour) {
                trueNumericTourId = tourId.replace(/\D/g,'');
                logMsg("SmartTour: Extrahierte echte Tour-ID: " + trueNumericTourId, "info");
            }
            
            var coordsApiUrl = 'https://www.komoot.de/api/v007/tours/' + trueNumericTourId + '/coordinates';
            var coordsData = null;
            
            try {
                coordsData = await fetchWithFallbacks(coordsApiUrl, "Coordinates (Standard)");
            } catch (err) {
                logMsg("Standard Coordinates API Failed. Checking SmartTour Fallback...", "warning");
            }
            
            // AUTOMATISCHER RETTUNGS-VERSUCH BEI 403 (Z.B. REINE SMART TOURS WIE ID 32734476)
            if (!coordsData || coordsData.error === "AccessDenied" || coordsData.error === "PrivateTour") {
                if (isSmartTour) {
                    logMsg("Tour blocked on standard endpoint. Attempting SmartTour Coordinates bypass...", "info");
                    var smartCoordsApiUrl = 'https://www.komoot.de/api/v007/smart_tours/' + trueNumericTourId + '/coordinates';
                    try {
                        coordsData = await fetchWithFallbacks(smartCoordsApiUrl, "Coordinates (Smart Bypass)");
                    } catch(e) {
                        // Fehlgeschlagen, wird unten abgefangen
                    }
                }
            }

            if (!coordsData || coordsData.error) {
                var errorMsg = coordsData ? coordsData.error : "Unknown Error";
                if (errorMsg === "AccessDenied" || errorMsg === "PrivateTour") {
                     logMsg("NOTICE: This tour is purely PRIVATE and cannot be accessed via public endpoints.", "error");
                     throw new Error("Access Denied: Tour is set to PRIVATE.");
                }
                throw new Error("API Error: " + errorMsg);
            }
            
            coordsDataItems = coordsData.items;

            if (!coordsDataItems || coordsDataItems.length === 0) {
                throw new Error("No GPS data found. The tour might be PRIVATE or empty.");
            }

            // 3. Hole POIs/Highlights (Gleicher Fallback für SmartTours)
            var poisData = [];
            try {
                var poisApiUrl = 'https://www.komoot.de/api/v007/tours/' + trueNumericTourId + '/highlights';
                var poisResponse = await fetchWithFallbacks(poisApiUrl, "POIs (Standard)");
                
                if (poisResponse && poisResponse.error === "AccessDenied" && isSmartTour) {
                    logMsg("Standard POI blocked. Trying Smart Bypass...", "warning");
                    poisApiUrl = 'https://www.komoot.de/api/v007/smart_tours/' + trueNumericTourId + '/highlights';
                    poisResponse = await fetchWithFallbacks(poisApiUrl, "POIs (Smart Bypass)");
                }
                
                if (poisResponse && poisResponse._embedded && poisResponse._embedded.items) {
                    poisData = poisResponse._embedded.items;
                }
            } catch(e) {
                logMsg("No highlights found or skipped.", "info");
            }
            
            renderMap(coordsDataItems, poisData);
            generateGPX(tourName, coordsDataItems, tourDistance, poisData, tourData);
            
            btn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg> Success!';
            
        } catch (error) {
            logMsg('ABORT: ' + error.message, "error");
            btn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg> Failed';
        } finally {
            setTimeout(function() { 
                btn.disabled = false; 
                btn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg> Preview & Download GPX';
            }, 3000);
        }
    }

    document.addEventListener('DOMContentLoaded', function() {
        var btn = document.getElementById('downloadBtn');
        if (btn) btn.addEventListener('click', startExport);

        try {
            var urlParams = new URLSearchParams(window.location.search);
            var sharedText = urlParams.get('text') || "";
            var sharedUrl = urlParams.get('url') || "";
            var combinedShare = sharedText + " " + sharedUrl;
            
            var cleanUrl = "";
            if (combinedShare.indexOf("komoot.de/tour/") > -1 || combinedShare.indexOf("komoot.com/tour/") > -1) {
                var splitChar = combinedShare.indexOf("komoot.de") > -1 ? "komoot.de/tour/" : "komoot.com/tour/";
                var idPart = combinedShare.split(splitChar)[1].split(" ")[0].split("?")[0].split("#")[0];
                cleanUrl = "https://www.komoot.de/tour/" + idPart;
            } else if (combinedShare.indexOf("komoot.de/smarttour/") > -1 || combinedShare.indexOf("komoot.com/smarttour/") > -1) {
                var splitChar = combinedShare.indexOf("komoot.de") > -1 ? "komoot.de/smarttour/" : "komoot.com/smarttour/";
                var idPart = combinedShare.split(splitChar)[1].split(" ")[0].split("?")[0].split("#")[0];
                cleanUrl = "https://www.komoot.de/smarttour/" + idPart;
            }
            
            if (cleanUrl !== "") {
                var urlInput = document.getElementById('tourUrl');
                if (urlInput) {
                    urlInput.value = cleanUrl + "?shared=true"; 
                    logMsg("Share Target active. Booting sequence...", "system");
                    setTimeout(function() { startExport(); }, 1000);
                }
            }
        } catch(e) {}
    });
</script>
</body>
</html>
