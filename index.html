<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Komoot 2 GPX Exporter</title>

    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="image/icon-192.png">
    <meta name="theme-color" content="#1e2124">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #121416;
            --card-bg: #1e2124;
            --input-bg: #2c2f33;
            --text-main: #ffffff;
            --text-muted: #a0a5a9;
            --primary: #97b536;
            --primary-hover: #86a32d;
            --install: #3498db;
            --install-hover: #2980b9;
            --console-bg: #0d0f11;
            --border-radius: 16px;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
        }

        .container {
            background: var(--card-bg);
            padding: 30px;
            border-radius: var(--border-radius);
            width: 100%;
            max-width: 620px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.05);
            margin-top: 2vh;
        }

        .header-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 5px;
        }

        .app-logo {
            width: 42px;
            height: 42px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        h1 {
            margin: 0;
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .meta-header {
            text-align: center;
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 25px;
            font-weight: 400;
        }

        .meta-header a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }

        .meta-header a:hover { color: #ffffff; }

        button, select {
            font-family: inherit;
        }

        button {
            width: 100%;
            padding: 15px 16px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        button svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        #installAppBtn {
            background: var(--install);
            color: white;
            margin-bottom: 20px;
            display: none;
            box-shadow: 0 4px 15px rgba(52, 152, 219, 0.3);
        }

        #installAppBtn:hover {
            background: var(--install-hover);
            transform: translateY(-2px);
        }

        .main-btn {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 15px rgba(151, 181, 54, 0.2);
        }

        .main-btn:hover:not(:disabled) {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(151, 181, 54, 0.4);
        }

        .secondary-btn {
            background: rgba(255,255,255,0.07);
            color: white;
            border: 1px solid rgba(255,255,255,0.08);
        }

        .secondary-btn:hover:not(:disabled) {
            background: rgba(255,255,255,0.12);
            transform: translateY(-1px);
        }

        button:disabled {
            background: #444 !important;
            color: #888 !important;
            cursor: not-allowed;
            box-shadow: none !important;
            transform: none !important;
        }

        .input-group {
            position: relative;
            margin-bottom: 15px;
        }

        input[type="url"] {
            width: 100%;
            padding: 16px 16px 16px 45px;
            border: 2px solid transparent;
            border-radius: 12px;
            background: var(--input-bg);
            color: white;
            font-size: 15px;
            outline: none;
            transition: all 0.2s ease;
        }

        input[type="url"]::placeholder { color: #666; }

        input[type="url"]:focus {
            border-color: var(--primary);
            background: #232528;
        }

        .input-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            fill: #666;
            pointer-events: none;
        }

        input[type="url"]:focus + .input-icon { fill: var(--primary); }

        .options-row {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-bottom: 15px;
        }

        .format-select {
            background: var(--input-bg);
            color: white;
            border: 2px solid transparent;
            border-radius: 12px;
            padding: 14px 15px;
            font-size: 14px;
            outline: none;
            cursor: pointer;
            width: 100%;
        }

        .format-select:focus { border-color: var(--primary); }

        .button-stack {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 14px;
        }

        #debug-console {
            margin-top: 25px;
            padding: 15px;
            background: var(--console-bg);
            border-radius: 10px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 12px;
            height: 220px;
            overflow-y: auto;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
            line-height: 1.6;
        }

        .log-links {
            margin-top: 12px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .log-links a {
            color: var(--primary);
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
        }

        .log-links a:hover { color: #ffffff; }

        #debug-console::-webkit-scrollbar { width: 6px; }
        #debug-console::-webkit-scrollbar-track { background: transparent; }
        #debug-console::-webkit-scrollbar-thumb { background: #444; border-radius: 10px; }
        #debug-console::-webkit-scrollbar-thumb:hover { background: #666; }

        .log-info { color: #8bb4e7; }
        .log-file {
            color: #3498db;
            background: rgba(52, 152, 219, 0.1);
            padding: 5px 8px;
            border-radius: 4px;
            display: inline-block;
            margin: 4px 0;
            border-left: 3px solid #3498db;
        }
        .log-success {
            color: #97b536;
            font-weight: bold;
            background: rgba(151,181,54,0.15);
            padding: 4px 8px;
            border-radius: 4px;
            border-left: 3px solid #97b536;
            display: inline-block;
            margin: 4px 0;
        }
        .log-warning { color: #f1c40f; opacity: 0.9; }
        .log-error { color: #ff5252; font-weight: bold; }
        .log-system {
            color: #bd93f9;
            font-weight: bold;
            margin-bottom: 5px;
            border-bottom: 1px dashed rgba(189, 147, 249, 0.3);
            padding-bottom: 3px;
        }
        .log-meta { color: #e67e22; font-style: italic; margin-left: 10px; }

        #map-container {
            width: 100%;
            height: 300px;
            margin-top: 20px;
            border-radius: 12px;
            display: none;
            border: 2px solid rgba(255,255,255,0.1);
            opacity: 0;
            transition: opacity 0.25s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            z-index: 1;
            overflow: hidden;
        }

        #map-container.visible {
            opacity: 1;
            display: block;
        }

        .direction-arrow-wrap {
            background: transparent;
            border: none;
        }

        .direction-arrow {
            width: 0;
            height: 0;
            border-left: 7px solid transparent;
            border-right: 7px solid transparent;
            border-bottom: 14px solid #f3f6f7;
            filter: drop-shadow(0 1px 3px rgba(0,0,0,0.8));
            opacity: 0.9;
        }

        .leaflet-popup-content-wrapper,
        .leaflet-popup-tip {
            background: #111417;
            color: #fff;
            border: 1px solid rgba(255,255,255,0.08);
        }

        .leaflet-popup-content {
            margin: 10px 12px;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            line-height: 1.4;
        }

        @media (max-width: 560px) {
            .container { padding: 20px; }
            #map-container { height: 260px; }
            .button-stack { grid-template-columns: 1fr; }
        }
    </style>

    <script>
        window.onerror = function(msg, url, line) {
            var log = document.getElementById('debug-console');
            if (log) log.innerHTML += '<div class="log-error">[CRASH] Line ' + line + ': ' + msg + '</div>';
            return false;
        };

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(function(err) { console.log('SW Error:', err); });
        }
    </script>
</head>
<body>

<div class="container">
    <div class="header-wrapper">
        <img src="image/icon-512.png" alt="Logo" class="app-logo" onerror="this.style.display='none'">
        <h1>Komoot 2 GPX</h1>
    </div>

    <div class="meta-header">
        v4.4 Smart Exporter | Built by <a href="https://github.com/basecore/Komoot-2-GPX" target="_blank" rel="noopener noreferrer">basecore</a>
    </div>

    <button type="button" id="installAppBtn">
        <svg viewBox="0 0 24 24"><path d="M17 1.01L7 .99C5.9 .99 5 1.9 5 3v18c0 1.1.9 2 2 2h10c1.1 0 2-.9 2-2V3c0-1.1-.9-1.99-2-1.99zM17 19H7V5h10v14zm-1 2H8v-1h8v1z"/></svg>
        Install App on Device
    </button>

    <div class="input-group">
        <input type="url" id="tourUrl" placeholder="Paste Komoot URL (e.g. komoot.de/tour/123)" autocomplete="off">
        <svg class="input-icon" viewBox="0 0 24 24"><path d="M10.59 13.41a1.996 1.996 0 0 1 0-2.82l3.18-3.18a2 2 0 1 1 2.83 2.83l-1.59 1.59h2.83l.17-.17a4 4 0 0 0-5.66-5.66l-3.18 3.18a4 4 0 0 0 5.66 5.66l.88-.88H12.88l-.29.29a1.996 1.996 0 0 1-2.82 0zM13.41 10.59a1.996 1.996 0 0 1 0 2.82l-3.18 3.18a2 2 0 1 1-2.83-2.83l1.59-1.59H6.17L6 12.34A4 4 0 0 0 11.66 18l3.18-3.18a4 4 0 0 0-5.66-5.66l-.88.88h2.83l.28-.29a1.996 1.996 0 0 1 2.82 0z"/></svg>
    </div>

    <div class="options-row">
        <select id="exportFormat" class="format-select">
            <option value="gpx">GPX (Garmin / Wahoo)</option>
            <option value="kml">KML (Google Maps / Earth)</option>
            <option value="csv">CSV (Raw Data)</option>
        </select>
    </div>

    <button type="button" id="compileBtn" class="main-btn">
        <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v3h2V5h14v14H5v-3H3v3c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM11 16l5-4-5-4v3H3v2h8v3z"/></svg>
        Compile & Preview
    </button>

    <div id="map-container"></div>

    <div id="actionButtons" class="button-stack" style="display:none;">
        <button type="button" id="invertBtn" class="secondary-btn">
            <svg viewBox="0 0 24 24"><path d="M7 7h11v2H7.83l2.58 2.59L9 13 4 8l5-5 1.41 1.41L7.83 7zM17 17H6v-2h10.17l-2.58-2.59L15 11l5 5-5 5-1.41-1.41L16.17 17z"/></svg>
            <span id="invertBtnText">Invert GPS Track Direction</span>
        </button>

        <button type="button" id="downloadBtn" class="main-btn">
            <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
            <span id="downloadBtnText">Download Route (Normal)</span>
        </button>
    </div>

    <div id="debug-console">
        <div class="log-system">user@komoot-exporter:~$ init engine</div>
        <div class="log-info">&gt; System ready. Share API active.</div>
    </div>

    <div class="log-links">
        <a href="https://github.com/basecore/Komoot-2-GPX" target="_blank" rel="noopener noreferrer">Github Project</a>
        <a href="https://github.com/basecore/Komoot-2-GPX/issues" target="_blank" rel="noopener noreferrer">Issues</a>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

<script>
    var map = null;
    var trackLayer = null;
    var poiLayerGroup = null;
    var arrowLayerGroup = null;

    var appState = {
        compiled: false,
        previewInverted: false,
        tourName: "",
        track: [],
        pois: [],
        tourData: {},
        distance: 0,
        descriptionSource: "None",
        poiSource: "None"
    };

    let deferredPrompt;
    const installBtn = document.getElementById('installAppBtn');

    window.addEventListener('beforeinstallprompt', function(e) {
        e.preventDefault();
        deferredPrompt = e;
        installBtn.style.display = 'flex';
    });

    installBtn.addEventListener('click', async function() {
        if (deferredPrompt !== null) {
            deferredPrompt.prompt();
            await deferredPrompt.userChoice;
            deferredPrompt = null;
            installBtn.style.display = 'none';
        }
    });

    window.addEventListener('appinstalled', function() {
        installBtn.style.display = 'none';
    });

    function logMsg(message, type) {
        if (!type) type = 'info';
        var consoleDiv = document.getElementById('debug-console');
        if (!consoleDiv) return;
        var time = new Date().toTimeString().split(' ')[0];
        var isBlock = (type === 'success' || type === 'file');
        var wrapStart = isBlock ? '<div style="width:100%">' : '';
        var wrapEnd = isBlock ? '</div>' : '';
        consoleDiv.innerHTML += wrapStart + '<div class="log-' + type + '"><span style="opacity:0.5">[' + time + ']</span> ' + message + '</div>' + wrapEnd;
        consoleDiv.scrollTop = consoleDiv.scrollHeight;
    }

    function escapeXml(str) {
        return (str || "").toString().replace(/[<>&'"]/g, function(c) {
            return {'<':'&lt;','>':'&gt;','&':'&amp;',"'":'&apos;','"':'&quot;'}[c];
        });
    }

    function escapeHtml(str) {
        return (str || "").toString().replace(/[&<>"']/g, function(m) {
            return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m];
        });
    }

    function fileSafeName(name) {
        return (name || "komoot_route").replace(/[^a-z0-9äöüß]+/gi, '_').replace(/^_+|_+$/g, '').toLowerCase();
    }

    function cloneTrack(items) {
        var out = [];
        for (var i = 0; i < items.length; i++) {
            out.push({
                lat: items[i].lat,
                lng: items[i].lng,
                alt: items[i].alt,
                t: items[i].t
            });
        }
        return out;
    }

    function reverseTrackKeepingTime(items) {
        var cloned = cloneTrack(items);
        var originalTimes = cloned.map(function(p) { return p.t; });
        cloned.reverse();
        for (var i = 0; i < cloned.length; i++) {
            cloned[i].t = originalTimes[i] || null;
        }
        return cloned;
    }

    function isValidCoord(lat, lng) {
        return typeof lat === 'number' && typeof lng === 'number' && !isNaN(lat) && !isNaN(lng);
    }

    function dedupePois(items) {
        var seen = {};
        var out = [];
        for (var i = 0; i < items.length; i++) {
            var p = items[i];
            var lat = (p.location && p.location.lat !== undefined) ? p.location.lat : p.lat;
            var lng = (p.location && p.location.lng !== undefined) ? p.location.lng : p.lng;
            if (!isValidCoord(lat, lng)) continue;
            var key = [Number(lat).toFixed(6), Number(lng).toFixed(6), (p.name || p.title || '').trim()].join('|');
            if (!seen[key]) {
                seen[key] = true;
                out.push(p);
            }
        }
        return out;
    }

    function getDescription(tourData) {
        return (tourData && (tourData.description || (tourData.tour_information && tourData.tour_information.description) || "")) || "";
    }

    function haversineMeters(aLat, aLng, bLat, bLng) {
        var R = 6371000;
        var dLat = (bLat - aLat) * Math.PI / 180;
        var dLng = (bLng - aLng) * Math.PI / 180;
        var lat1 = aLat * Math.PI / 180;
        var lat2 = bLat * Math.PI / 180;

        var s1 = Math.sin(dLat / 2);
        var s2 = Math.sin(dLng / 2);
        var c = s1 * s1 + Math.cos(lat1) * Math.cos(lat2) * s2 * s2;
        var d = 2 * Math.atan2(Math.sqrt(c), Math.sqrt(1 - c));
        return R * d;
    }

    function bearingDegrees(aLat, aLng, bLat, bLng) {
        var lat1 = aLat * Math.PI / 180;
        var lat2 = bLat * Math.PI / 180;
        var dLng = (bLng - aLng) * Math.PI / 180;
        var y = Math.sin(dLng) * Math.cos(lat2);
        var x = Math.cos(lat1) * Math.sin(lat2) - Math.sin(lat1) * Math.cos(lat2) * Math.cos(dLng);
        var brng = Math.atan2(y, x) * 180 / Math.PI;
        return (brng + 360) % 360;
    }

    var PROXY_LIST = [
        { name: "Direct API", type: "raw", url: function(u) { return u; } },
        { name: "allorigins (Wrapped)", type: "wrapper", url: function(u) { return 'https://api.allorigins.win/get?url=' + encodeURIComponent(u); } },
        { name: "corsproxy.io", type: "raw", url: function(u) { return 'https://corsproxy.io/?' + encodeURIComponent(u); } },
        { name: "cors.sh", type: "raw", url: function(u) { return 'https://proxy.cors.sh/' + u; } },
        { name: "codetabs", type: "raw", url: function(u) { return 'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(u); } },
        { name: "cors.x2u.in", type: "raw", url: function(u) { return 'https://cors.x2u.in/?' + encodeURIComponent(u); } }
    ];

    async function fetchWithFallbacks(targetUrl, contextName) {
        logMsg('Fetching ' + contextName + '...', "system");
        var lastError = "";

        for (var i = 0; i < PROXY_LIST.length; i++) {
            var proxy = PROXY_LIST[i];
            var proxyUrl = proxy.url(targetUrl);
            logMsg('> Trying ' + proxy.name + '...', "info");

            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(function() { controller.abort(); }, 12000);

                var reqHeaders = { 'Accept': 'application/hal+json, application/json, */*' };
                if (proxy.name === 'cors.sh') reqHeaders['x-cors-api-key'] = 'temp_81f0b093380c2f8f8ed97405d4142f74';

                var response = await fetch(proxyUrl, {
                    headers: reqHeaders,
                    cache: 'no-store',
                    signal: controller.signal
                });

                clearTimeout(timeoutId);

                if (!response.ok) throw new Error('HTTP ' + response.status);

                var data;
                if (proxy.type === "wrapper") {
                    var wrapper = await response.json();
                    if (!wrapper.contents) throw new Error("Empty wrapper contents");
                    data = JSON.parse(wrapper.contents);
                } else {
                    var text = await response.text();
                    if (text.trim().startsWith('<')) throw new Error("Blocked (Returned HTML)");
                    data = JSON.parse(text);
                }

                logMsg('⭐ SUCCESS! ' + contextName + ' loaded via ' + proxy.name + ' ⭐', "success");
                return data;

            } catch (err) {
                var errMsg = err.name === 'AbortError' ? "Timeout (>12s)" : err.message;
                logMsg('× ' + proxy.name + ' failed: ' + errMsg, "warning");
                lastError = errMsg;
            }
        }
        throw new Error('All routes dead. Last error: ' + lastError);
    }

    async function fetchTextWithFallbacks(targetUrl, contextName) {
        logMsg('Fetching ' + contextName + '...', "system");
        var lastError = "";

        for (var i = 0; i < PROXY_LIST.length; i++) {
            var proxy = PROXY_LIST[i];
            var proxyUrl = proxy.url(targetUrl);
            logMsg('> Trying ' + proxy.name + '...', "info");

            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(function() { controller.abort(); }, 12000);

                var reqHeaders = { 'Accept': 'text/html,application/xhtml+xml,text/plain,*/*' };
                if (proxy.name === 'cors.sh') reqHeaders['x-cors-api-key'] = 'temp_81f0b093380c2f8f8ed97405d4142f74';

                var response = await fetch(proxyUrl, {
                    headers: reqHeaders,
                    cache: 'no-store',
                    signal: controller.signal
                });

                clearTimeout(timeoutId);
                if (!response.ok) throw new Error('HTTP ' + response.status);

                var text;
                if (proxy.type === "wrapper") {
                    var wrapper = await response.json();
                    if (!wrapper.contents) throw new Error("Empty wrapper contents");
                    text = wrapper.contents;
                } else {
                    text = await response.text();
                }

                if (!text || text.length < 1000) throw new Error("HTML too short / blocked");

                logMsg('⭐ SUCCESS! ' + contextName + ' loaded via ' + proxy.name + ' ⭐', "success");
                return text;
            } catch (err) {
                var errMsg = err.name === 'AbortError' ? "Timeout (>12s)" : err.message;
                logMsg('× ' + proxy.name + ' failed: ' + errMsg, "warning");
                lastError = errMsg;
            }
        }

        throw new Error('All routes dead. Last error: ' + lastError);
    }

    function decodeKomootPropsString(str) {
        return str
            .replace(/\\\\/g, '\\u005c')
            .replace(/\\"/g, '"')
            .replace(/\
/g, '
')
            .replace(/\\r/g, '')
            .replace(/\\t/g, '\t')
            .replace(/\\u003c/g, '<')
            .replace(/\\u003e/g, '>')
            .replace(/\\u0026/g, '&')
            .replace(/&amp;lt;/g, '<')
            .replace(/&amp;gt;/g, '>')
            .replace(/&quot;/g, '"')
            .replace(/&#39;/g, "'")
            .replace(/\\u005c/g, '\\');
    }

    function parseKomootHtmlFallback(html) {
        var result = {
            description: "",
            pois: [],
            source: "None"
        };

        try {
            var match = html.match(/kmtBoot.setProps("([sS]*?)");/);
            if (match && match[1]) {
                var raw = decodeKomootPropsString(match[1]);
                var props = JSON.parse(raw);

                var tour = props &&
                           props.page &&
                           props.page._embedded &&
                           props.page._embedded.tour
                           ? props.page._embedded.tour
                           : null;

                if (tour) {
                    result.description =
                        tour.description ||
                        (tour.tour_information && tour.tour_information.description) ||
                        "";

                    var items =
                        tour._embedded &&
                        tour._embedded.elements &&
                        tour._embedded.elements._embedded &&
                        tour._embedded.elements._embedded.items
                        ? tour._embedded.elements._embedded.items
                        : [];

                    var extracted = [];

                    for (var i = 0; i < items.length; i++) {
                        var item = items[i] || {};
                        var embedded = item._embedded || {};
                        var candidate = embedded.highlight || embedded.poi || embedded.reference || embedded.destination || item;

                        var lat = null;
                        var lng = null;

                        if (candidate.location && isValidCoord(candidate.location.lat, candidate.location.lng)) {
                            lat = candidate.location.lat;
                            lng = candidate.location.lng;
                        } else if (isValidCoord(candidate.lat, candidate.lng)) {
                            lat = candidate.lat;
                            lng = candidate.lng;
                        } else if (item.location && isValidCoord(item.location.lat, item.location.lng)) {
                            lat = item.location.lat;
                            lng = item.location.lng;
                        } else if (isValidCoord(item.lat, item.lng)) {
                            lat = item.lat;
                            lng = item.lng;
                        }

                        if (isValidCoord(lat, lng)) {
                            extracted.push({
                                lat: lat,
                                lng: lng,
                                name: candidate.name || candidate.title || item.name || item.title || "Highlight",
                                description: candidate.description || item.description || ""
                            });
                        }
                    }

                    result.pois = dedupePois(extracted);
                    result.source = "HTML kmtBoot";
                }
            }

            if (!result.description) {
                var metaMatch = html.match(/<metas+name="description"s+content="([^"]+)"/i);
                if (metaMatch && metaMatch[1]) {
                    result.description = metaMatch[1];
                    if (result.source === "None") result.source = "HTML meta";
                }
            }
        } catch (e) {
            logMsg("HTML fallback parse failed: " + e.message, "warning");
        }

        return result;
    }

    function buildPopupHtml(title, description) {
        var html = '<div><strong>' + escapeHtml(title || 'Marker') + '</strong>';
        if (description) {
            html += '<div style="margin-top:6px;color:#c7cbd0;">' + escapeHtml(description) + '</div>';
        }
        html += '</div>';
        return html;
    }

    function ensureMapVisible() {
        var mapDiv = document.getElementById('map-container');
        mapDiv.style.display = 'block';
        mapDiv.classList.add('visible');
    }

    function createOrResetMap() {
        ensureMapVisible();

        if (!map) {
            map = L.map('map-container', {
                zoomControl: true,
                preferCanvas: true
            });

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap'
            }).addTo(map);
        }

        if (trackLayer) {
            try { map.removeLayer(trackLayer); } catch(e) {}
            trackLayer = null;
        }

        if (poiLayerGroup) {
            try { map.removeLayer(poiLayerGroup); } catch(e) {}
            poiLayerGroup = null;
        }

        if (arrowLayerGroup) {
            try { map.removeLayer(arrowLayerGroup); } catch(e) {}
            arrowLayerGroup = null;
        }

        poiLayerGroup = L.layerGroup().addTo(map);
        arrowLayerGroup = L.layerGroup().addTo(map);
    }

    function addDirectionArrows(coords) {
        if (!arrowLayerGroup || !coords || coords.length < 2) return;

        var spacingMeters = 2000;
        var acc = 0;
        var nextArrowAt = spacingMeters;

        for (var i = 1; i < coords.length; i++) {
            var prev = coords[i - 1];
            var cur = coords[i];
            var seg = haversineMeters(prev.lat, prev.lng, cur.lat, cur.lng);
            acc += seg;

            if (acc >= nextArrowAt) {
                var angle = bearingDegrees(prev.lat, prev.lng, cur.lat, cur.lng);

                var icon = L.divIcon({
                    className: 'direction-arrow-wrap',
                    html: '<div class="direction-arrow" style="transform: rotate(' + angle + 'deg);"></div>',
                    iconSize: [16, 16],
                    iconAnchor: [8, 8]
                });

                var marker = L.marker([cur.lat, cur.lng], {
                    icon: icon,
                    interactive: false,
                    keyboard: false
                });

                arrowLayerGroup.addLayer(marker);
                nextArrowAt += spacingMeters;
            }
        }
    }

    function renderMap(coords, pois) {
        try {
            if (!coords || !coords.length) throw new Error("No coordinates to render");

            createOrResetMap();

            var latLngs = [];
            for (var i = 0; i < coords.length; i++) {
                latLngs.push([coords[i].lat, coords[i].lng]);
            }

            trackLayer = L.polyline(latLngs, {
                color: '#97b536',
                weight: 5,
                opacity: 0.95,
                lineCap: 'round',
                lineJoin: 'round'
            }).addTo(map);

            if (pois && pois.length > 0) {
                for (var j = 0; j < pois.length; j++) {
                    var poi = pois[j];
                    var poiLat = (poi.location && poi.location.lat !== undefined) ? poi.location.lat : poi.lat;
                    var poiLng = (poi.location && poi.location.lng !== undefined) ? poi.location.lng : poi.lng;
                    var poiName = poi.name || poi.title || "Highlight";
                    var poiDesc = poi.description || "";

                    if (isValidCoord(poiLat, poiLng)) {
                        var poiMarker = L.circleMarker([poiLat, poiLng], {
                            radius: 5,
                            fillColor: "#e67e22",
                            color: "#fff",
                            weight: 2,
                            opacity: 1,
                            fillOpacity: 1
                        });

                        poiMarker.bindPopup(buildPopupHtml("POI: " + poiName, poiDesc));
                        poiLayerGroup.addLayer(poiMarker);
                    }
                }
            }

            var startPt = coords[0];
            var endPt = coords[coords.length - 1];
            var dLat = Math.abs(startPt.lat - endPt.lat);
            var dLng = Math.abs(startPt.lng - endPt.lng);
            var isLoop = (dLat < 0.0002 && dLng < 0.0002);

            if (isLoop) {
                var loopStart = L.circleMarker([startPt.lat, startPt.lng], {
                    radius: 11,
                    fillColor: "#2ecc71",
                    color: "#fff",
                    weight: 2,
                    opacity: 1,
                    fillOpacity: 1
                });
                loopStart.bindPopup(buildPopupHtml("Start & End", "Loop tour"));
                poiLayerGroup.addLayer(loopStart);

                var loopEnd = L.circleMarker([endPt.lat, endPt.lng], {
                    radius: 5,
                    fillColor: "#e74c3c",
                    color: "#fff",
                    weight: 1,
                    opacity: 1,
                    fillOpacity: 1
                });
                loopEnd.bindPopup(buildPopupHtml("End", ""));
                poiLayerGroup.addLayer(loopEnd);
            } else {
                var startMarker = L.circleMarker([startPt.lat, startPt.lng], {
                    radius: 8,
                    fillColor: "#2ecc71",
                    color: "#fff",
                    weight: 2,
                    opacity: 1,
                    fillOpacity: 1
                });
                startMarker.bindPopup(buildPopupHtml("Start", ""));
                poiLayerGroup.addLayer(startMarker);

                var endMarker = L.circleMarker([endPt.lat, endPt.lng], {
                    radius: 8,
                    fillColor: "#e74c3c",
                    color: "#fff",
                    weight: 2,
                    opacity: 1,
                    fillOpacity: 1
                });
                endMarker.bindPopup(buildPopupHtml("End", ""));
                poiLayerGroup.addLayer(endMarker);
            }

            addDirectionArrows(coords);

            var bounds = trackLayer.getBounds();
            if (bounds.isValid()) {
                map.fitBounds(bounds, { padding: [20, 20] });
            }

            setTimeout(function() {
                if (map) map.invalidateSize();
            }, 250);

            logMsg("Map rendering complete", "info");
        } catch(e) {
            logMsg('Map Error: ' + e.message, "error");
        }
    }

    function updateSmartButtons() {
        var invertTxt = document.getElementById('invertBtnText');
        var downloadTxt = document.getElementById('downloadBtnText');

        if (appState.previewInverted) {
            invertTxt.textContent = "Show Normal Direction";
            downloadTxt.textContent = "Download Route (Inverted)";
        } else {
            invertTxt.textContent = "Invert GPS Track Direction";
            downloadTxt.textContent = "Download Route (Normal)";
        }
    }

    function updatePreviewRender() {
        if (!appState.compiled) return;

        var renderTrack = appState.previewInverted
            ? reverseTrackKeepingTime(appState.track)
            : cloneTrack(appState.track);

        renderMap(renderTrack, appState.pois);
        updateSmartButtons();
    }

    function downloadBlob(content, filename, mimeType, meta) {
        try {
            var blob = new Blob([content], { type: mimeType });
            var link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = filename;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            logMsg("Download completed successfully!", "success");
            logMsg("File saved to folder: Downloads/" + filename, "file");
            logMsg("--- Embedded metadata ---", "info");
            logMsg("↳ Tour description: " + (meta.hasDescription ? "Yes" : "No"), "meta");
            logMsg("↳ Description source: " + (meta.descriptionSource || "None"), "meta");
            logMsg("↳ POIs / Highlights: " + (meta.poiCount > 0 ? meta.poiCount + " found" : "None"), "meta");
            logMsg("↳ POI source: " + (meta.poiSource || "None"), "meta");
        } catch (e) {
            logMsg("Download Error: " + e.message, "error");
        }
    }

    function generateGPX(name, items, pois, tourData, meta) {
        logMsg("Compiling GPX...", "system");

        var safeName = escapeXml(name);
        var filename = fileSafeName(name) + '.gpx';
        var description = getDescription(tourData);

        var lines = [];
        lines.push('<?xml version="1.0" encoding="UTF-8"?>');
        lines.push('<gpx version="1.1" creator="Komoot2GPX" xmlns="http://www.topografix.com/GPX/1/1">');
        lines.push('  <metadata>');
        lines.push('    <name>' + safeName + '</name>');
        if (description) lines.push('    <desc>' + escapeXml(description) + '</desc>');
        lines.push('  </metadata>');

        var poiCount = 0;
        if (pois && pois.length > 0) {
            for (var j = 0; j < pois.length; j++) {
                var poi = pois[j];
                var poiLat = (poi.location && poi.location.lat !== undefined) ? poi.location.lat : poi.lat;
                var poiLng = (poi.location && poi.location.lng !== undefined) ? poi.location.lng : poi.lng;
                var poiName = poi.name || poi.title || "Highlight";
                var poiDesc = poi.description || "";

                if (isValidCoord(poiLat, poiLng)) {
                    lines.push('  <wpt lat="' + poiLat + '" lon="' + poiLng + '">');
                    lines.push('    <name>' + escapeXml(poiName) + '</name>');
                    if (poiDesc) lines.push('    <desc>' + escapeXml(poiDesc) + '</desc>');
                    lines.push('    <sym>Generic</sym>');
                    lines.push('  </wpt>');
                    poiCount++;
                }
            }
        }

        lines.push('  <trk>');
        lines.push('    <name>' + safeName + '</name>');
        lines.push('    <trkseg>');

        for (var i = 0; i < items.length; i++) {
            var pt = items[i];
            lines.push('      <trkpt lat="' + pt.lat + '" lon="' + pt.lng + '">');
            if (pt.alt !== undefined) lines.push('        <ele>' + pt.alt + '</ele>');
            if (pt.t) lines.push('        <time>' + new Date(pt.t).toISOString() + '</time>');
            lines.push('      </trkpt>');
        }

        lines.push('    </trkseg>');
        lines.push('  </trk>');
        lines.push('</gpx>');

        downloadBlob(lines.join('
'), filename, 'application/gpx+xml', {
            hasDescription: !!description,
            descriptionSource: meta.descriptionSource,
            poiCount: poiCount,
            poiSource: meta.poiSource
        });
    }

    function generateKML(name, items, pois, tourData, meta) {
        logMsg("Compiling KML...", "system");

        var safeName = escapeXml(name);
        var filename = fileSafeName(name) + '.kml';
        var description = getDescription(tourData);

        var lines = [];
        lines.push('<?xml version="1.0" encoding="UTF-8"?>');
        lines.push('<kml xmlns="http://www.opengis.net/kml/2.2">');
        lines.push('  <Document>');
        lines.push('    <name>' + safeName + '</name>');
        if (description) lines.push('    <description>' + escapeXml(description) + '</description>');
        lines.push('    <Style id="trackStyle"><LineStyle><color>ff36b597</color><width>5</width></LineStyle></Style>');

        var poiCount = 0;
        if (pois && pois.length > 0) {
            for (var j = 0; j < pois.length; j++) {
                var poi = pois[j];
                var poiLat = (poi.location && poi.location.lat !== undefined) ? poi.location.lat : poi.lat;
                var poiLng = (poi.location && poi.location.lng !== undefined) ? poi.location.lng : poi.lng;
                var poiName = poi.name || poi.title || "Highlight";
                var poiDesc = poi.description || "";

                if (isValidCoord(poiLat, poiLng)) {
                    lines.push('    <Placemark>');
                    lines.push('      <name>' + escapeXml(poiName) + '</name>');
                    if (poiDesc) lines.push('      <description>' + escapeXml(poiDesc) + '</description>');
                    lines.push('      <Point><coordinates>' + poiLng + ',' + poiLat + ',0</coordinates></Point>');
                    lines.push('    </Placemark>');
                    poiCount++;
                }
            }
        }

        lines.push('    <Placemark>');
        lines.push('      <name>' + safeName + '</name>');
        lines.push('      <styleUrl>#trackStyle</styleUrl>');
        lines.push('      <LineString>');
        lines.push('        <tessellate>1</tessellate>');
        lines.push('        <coordinates>');
        for (var i = 0; i < items.length; i++) {
            var ele = (items[i].alt !== undefined) ? items[i].alt : 0;
            lines.push('          ' + items[i].lng + ',' + items[i].lat + ',' + ele);
        }
        lines.push('        </coordinates>');
        lines.push('      </LineString>');
        lines.push('    </Placemark>');
        lines.push('  </Document>');
        lines.push('</kml>');

        downloadBlob(lines.join('
'), filename, 'application/vnd.google-earth.kml+xml', {
            hasDescription: !!description,
            descriptionSource: meta.descriptionSource,
            poiCount: poiCount,
            poiSource: meta.poiSource
        });
    }

    function generateCSV(name, items, pois, tourData, meta) {
        logMsg("Compiling CSV...", "system");

        var filename = fileSafeName(name) + '.csv';
        var rows = [];
        rows.push(['type','name','description','lat','lng','ele','time'].join(','));

        for (var i = 0; i < items.length; i++) {
            var pt = items[i];
            rows.push([
                'trackpoint',
                '"' + (name || '').replace(/"/g, '""') + '"',
                '""',
                pt.lat,
                pt.lng,
                pt.alt !== undefined ? pt.alt : '',
                pt.t ? '"' + new Date(pt.t).toISOString() + '"' : ''
            ].join(','));
        }

        var poiCount = 0;
        for (var j = 0; j < (pois || []).length; j++) {
            var poi = pois[j];
            var poiLat = (poi.location && poi.location.lat !== undefined) ? poi.location.lat : poi.lat;
            var poiLng = (poi.location && poi.location.lng !== undefined) ? poi.location.lng : poi.lng;

            if (isValidCoord(poiLat, poiLng)) {
                rows.push([
                    'poi',
                    '"' + String(poi.name || poi.title || 'Highlight').replace(/"/g, '""') + '"',
                    '"' + String(poi.description || '').replace(/"/g, '""') + '"',
                    poiLat,
                    poiLng,
                    '',
                    ''
                ].join(','));
                poiCount++;
            }
        }

        downloadBlob(rows.join('
'), filename, 'text/csv;charset=utf-8', {
            hasDescription: !!getDescription(tourData),
            descriptionSource: meta.descriptionSource,
            poiCount: poiCount,
            poiSource: meta.poiSource
        });
    }

    function doDownload() {
        if (!appState.compiled) {
            logMsg("Nothing compiled yet. Please run preview first.", "warning");
            return;
        }

        var format = document.getElementById('exportFormat').value;
        var isReversed = appState.previewInverted;
        
        var track = isReversed ? reverseTrackKeepingTime(appState.track) : cloneTrack(appState.track);
        var exportName = appState.tourName + (isReversed ? ' Inverted' : '');

        var meta = {
            descriptionSource: appState.descriptionSource,
            poiSource: appState.poiSource
        };

        if (isReversed) {
            logMsg("Preparing inverted export...", "meta");
        } else {
            logMsg("Preparing normal export...", "meta");
        }

        if (format === 'kml') {
            generateKML(exportName, track, appState.pois, appState.tourData, meta);
        } else if (format === 'csv') {
            generateCSV(exportName, track, appState.pois, appState.tourData, meta);
        } else {
            generateGPX(exportName, track, appState.pois, appState.tourData, meta);
        }
    }

    function getTourInfoFromUrl(urlInput) {
        var tourId = "";
        var isSmartTour = false;

        if (urlInput.indexOf("/smarttour/") > -1) {
            isSmartTour = true;
            tourId = urlInput.split("/smarttour/")[1].split("?")[0].split("/")[0].split("#")[0];
        } else if (urlInput.indexOf("/tour/") > -1) {
            isSmartTour = false;
            tourId = urlInput.split("/tour/")[1].split("?")[0].split("/")[0].split("#")[0];
        }

        return { tourId: tourId, isSmartTour: isSmartTour };
    }

    async function compilePreview() {
        var urlInput = document.getElementById('tourUrl').value.trim();
        var btn = document.getElementById('compileBtn');
        var consoleDiv = document.getElementById('debug-console');
        var actionButtons = document.getElementById('actionButtons');
        var mapDiv = document.getElementById('map-container');

        consoleDiv.innerHTML = '<div class="log-system">user@komoot-exporter:~$ compile --preview</div>';
        actionButtons.style.display = 'none';
        mapDiv.classList.remove('visible');
        mapDiv.style.display = 'none';

        appState.compiled = false;
        appState.previewInverted = false;

        if (!urlInput) {
            logMsg("Error: Please provide a URL", "error");
            return;
        }

        btn.disabled = true;
        btn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46C19.54 15.03 20 13.57 20 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 7.74C4.46 8.97 4 10.43 4 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z"/></svg> Processing...';

        try {
            var parsed = getTourInfoFromUrl(urlInput);
            var tourId = parsed.tourId;
            var isSmartTour = parsed.isSmartTour;

            if (!tourId) throw new Error("Invalid URL format");

            logMsg('Target: ID ' + tourId + ' (' + (isSmartTour ? 'Smart' : 'Standard') + ')', "info");

            var numericTourId = isSmartTour ? tourId.replace(/D/g, '') : tourId;

            var tourApiUrl = isSmartTour
                ? 'https://www.komoot.de/api/v007/discover_tours/' + tourId
                : 'https://www.komoot.de/api/v007/tours/' + numericTourId;

            var coordsApiUrl = isSmartTour
                ? 'https://www.komoot.de/api/v007/smart_tours/' + numericTourId + '/coordinates'
                : 'https://www.komoot.de/api/v007/tours/' + numericTourId + '/coordinates';

            var tourData = await fetchWithFallbacks(tourApiUrl, "Metadata");

            if (tourData.error) {
                if (tourData.error === "AccessDenied" || tourData.error === "PrivateTour") {
                    throw new Error("Access Denied: This tour is set to PRIVATE.");
                }
                throw new Error("API Error: " + tourData.error);
            }

            var tourName = tourData.name || tourData.title || ('Komoot_Tour_' + numericTourId);
            var tourDistance = tourData.distance || 0;
            var descriptionSource = getDescription(tourData) ? "API" : "None";

            var coordsData = await fetchWithFallbacks(coordsApiUrl, isSmartTour ? "Coordinates (Smart)" : "Coordinates (Standard)");

            if (coordsData.error) {
                if (coordsData.error === "AccessDenied" || coordsData.error === "PrivateTour") {
                    throw new Error("Access Denied: This tour is set to PRIVATE.");
                }
                throw new Error("API Error: " + coordsData.error);
            }

            if (!coordsData.items || coordsData.items.length === 0) {
                throw new Error("No GPS data found.");
            }

            var poisData = [];
            var poiSource = "None";

            try {
                var poisApiUrl = 'https://www.komoot.de/api/v007/tours/' + numericTourId + '/highlights';
                var poisResponse = await fetchWithFallbacks(poisApiUrl, "POIs (Standard)");

                if (poisResponse && poisResponse._embedded && poisResponse._embedded.items) {
                    poisData = poisResponse._embedded.items;
                    poiSource = "API";
                } else if (poisResponse && poisResponse.items) {
                    poisData = poisResponse.items;
                    poiSource = "API";
                }
            } catch (e) {
                logMsg("No highlights found or skipped.", "warning");
            }

            var needHtmlDescription = !getDescription(tourData);
            var needHtmlPois = !poisData || poisData.length === 0;

            if (needHtmlDescription || needHtmlPois) {
                try {
                    var publicTourUrl = isSmartTour
                        ? 'https://www.komoot.de/smarttour/' + numericTourId
                        : 'https://www.komoot.de/tour/' + numericTourId;

                    var html = await fetchTextWithFallbacks(publicTourUrl, "Public Tour HTML");
                    var fallbackData = parseKomootHtmlFallback(html);

                    if (needHtmlDescription && fallbackData.description) {
                        if (!tourData.tour_information) tourData.tour_information = {};
                        tourData.tour_information.description = fallbackData.description;
                        descriptionSource = fallbackData.source || "HTML";
                        logMsg("↳ Tour description found via HTML fallback", "meta");
                    }

                    if (needHtmlPois && fallbackData.pois && fallbackData.pois.length > 0) {
                        poisData = fallbackData.pois;
                        poiSource = fallbackData.source || "HTML";
                        logMsg("↳ POIs / Highlights found via HTML fallback: " + poisData.length, "meta");
                    }
                } catch (e) {
                    logMsg("HTML fallback not available: " + e.message, "warning");
                }
            }

            poisData = dedupePois(poisData || []);

            appState.compiled = true;
            appState.previewInverted = false;
            appState.tourName = tourName;
            appState.track = cloneTrack(coordsData.items);
            appState.pois = poisData;
            appState.tourData = tourData;
            appState.distance = tourDistance;
            appState.descriptionSource = descriptionSource || "None";
            appState.poiSource = poiSource || "None";

            logMsg("Compile success: " + coordsData.items.length + " pts | " + (tourDistance ? (tourDistance / 1000).toFixed(2) + " km" : "Unknown length"), "success");
            logMsg("Description source: " + appState.descriptionSource, "meta");
            logMsg("POI source: " + appState.poiSource, "meta");

            renderMap(appState.track, appState.pois);
            updateSmartButtons();

            actionButtons.style.display = 'grid';

            btn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg> Preview Ready';

        } catch (error) {
            logMsg('ABORT: ' + error.message, "error");
            btn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg> Failed';
        } finally {
            setTimeout(function() {
                btn.disabled = false;
                btn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v3h2V5h14v14H5v-3H3v3c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM11 16l5-4-5-4v3H3v2h8v3z"/></svg> Compile & Preview';
            }, 2500);
        }
    }

    document.addEventListener('DOMContentLoaded', function() {
        var compileBtn = document.getElementById('compileBtn');
        var invertBtn = document.getElementById('invertBtn');
        var downloadBtn = document.getElementById('downloadBtn');

        if (compileBtn) compileBtn.addEventListener('click', compilePreview);

        if (invertBtn) {
            invertBtn.addEventListener('click', function() {
                if (!appState.compiled) return;
                appState.previewInverted = !appState.previewInverted;
                logMsg("Preview switched to " + (appState.previewInverted ? "INVERTED" : "NORMAL"), "meta");
                updatePreviewRender();
            });
        }

        if (downloadBtn) {
            downloadBtn.addEventListener('click', function() {
                doDownload();
            });
        }

        try {
            var urlParams = new URLSearchParams(window.location.search);
            var sharedText = urlParams.get('text') || "";
            var sharedUrl = urlParams.get('url') || "";
            var combinedShare = sharedText + " " + sharedUrl;

            var cleanUrl = "";
            if (combinedShare.indexOf("komoot.de/tour/") > -1 || combinedShare.indexOf("komoot.com/tour/") > -1) {
                var splitCharA = combinedShare.indexOf("komoot.de") > -1 ? "komoot.de/tour/" : "komoot.com/tour/";
                var idPartA = combinedShare.split(splitCharA)[1].split(" ")[0].split("?")[0].split("#")[0];
                cleanUrl = "https://www.komoot.de/tour/" + idPartA;
            } else if (combinedShare.indexOf("komoot.de/smarttour/") > -1 || combinedShare.indexOf("komoot.com/smarttour/") > -1) {
                var splitCharB = combinedShare.indexOf("komoot.de") > -1 ? "komoot.de/smarttour/" : "komoot.com/smarttour/";
                var idPartB = combinedShare.split(splitCharB)[1].split(" ")[0].split("?")[0].split("#")[0];
                cleanUrl = "https://www.komoot.de/smarttour/" + idPartB;
            }

            if (cleanUrl !== "") {
                var urlInput = document.getElementById('tourUrl');
                if (urlInput) {
                    urlInput.value = cleanUrl + "?shared=true";
                    logMsg("Share Target active. Booting sequence...", "system");
                    setTimeout(function() { compilePreview(); }, 1000);
                }
            }
        } catch(e) {}
    });
</script>
</body>
</html>
