<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Komoot 2 GPX Exporter</title>
    <meta name="theme-color" content="#1e2124">
    <link rel="manifest" href="manifest.json">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    
    <style>
        :root {
            --bg-color: #f4f4f9; --text-color: #333; --box-bg: #fff;
            --primary: #97b536; --primary-hover: #7a942a;
            --error: #ff4444; --warning: #f39c12; --debug-bg: #111;
        }
        @media (prefers-color-scheme: dark) {
            :root { --bg-color: #1e2124; --text-color: #f4f4f9; --box-bg: #2c2f33; }
        }
        body { font-family: -apple-system, sans-serif; background: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px; }
        .container { background: var(--box-bg); padding: 20px; border-radius: 12px; max-width: 600px; margin: 0 auto; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        h1 { text-align: center; margin-top: 0; font-size: 22px; margin-bottom: 5px; }
        
        .meta-header { text-align: center; font-size: 12px; color: #888; margin-bottom: 20px; line-height: 1.5; }
        .meta-header a { color: var(--primary); text-decoration: none; font-weight: bold; }
        .meta-header a:hover { text-decoration: underline; }

        input[type="url"] { width: 100%; padding: 15px; margin-bottom: 10px; border: 1px solid #555; border-radius: 8px; box-sizing: border-box; background: var(--bg-color); color: var(--text-color); font-size: 16px;}
        button { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; transition: background 0.2s;}
        button:disabled { background: #555; cursor: not-allowed; }
        
        #debug-console {
            margin-top: 20px; padding: 10px; background: var(--debug-bg); color: #fff;
            border-radius: 6px; font-family: monospace; font-size: 12px; height: 180px; 
            overflow-y: auto; word-break: break-all; border: 2px solid #444;
        }
        .log-info { color: #88ccff; margin-bottom: 3px; }
        .log-success { color: #00ff00; font-weight: bold; margin-bottom: 3px; }
        .log-warning { color: #ffaa00; margin-bottom: 3px; }
        .log-error { color: #ffffff; background: #cc0000; font-weight: bold; padding: 3px; margin-bottom: 3px; border-radius: 3px; }
        .log-system { color: #ff00ff; font-weight: bold; margin-bottom: 3px; }
        
        #map-container { width: 100%; height: 250px; margin-top: 20px; border-radius: 8px; display: none; border: 2px solid var(--primary); }
    </style>

    <script>
        window.onerror = function(msg, url, line) {
            var log = document.getElementById('debug-console');
            if (log) log.innerHTML += '<div class="log-error">[CRASH] Line ' + line + ': ' + msg + '</div>';
            return false;
        };

        // Service Worker registrieren (zwingend erforderlich für Chrome "App installieren" Dialog)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('./sw.js').then(function(registration) {
                    console.log('ServiceWorker erfolgreich registriert!');
                }).catch(function(err) {
                    console.log('ServiceWorker Fehler: ', err);
                });
            });
        }
    </script>
</head>
<body>

<div class="container">
    <h1>Komoot 2 GPX</h1>
    <div class="meta-header">
        v2.2 | Released: 28.04.2026 | by basecore<br>
        <a href="https://github.com/basecore/Komoot-2-GPX" target="_blank">View on GitHub</a> • 
        <a href="https://github.com/basecore/Komoot-2-GPX/issues" target="_blank">Report Issue</a>
    </div>
    
    <input type="url" id="tourUrl" placeholder="Paste Komoot URL (e.g. komoot.de/tour/123)" autocomplete="off">
    <button type="button" id="downloadBtn">Preview & Download GPX</button>
    
    <div id="debug-console">
        <div class="log-system">=== SYSTEM READY ===</div>
    </div>
    
    <div id="map-container"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

<script>
    var map = null;
    var trackLayer = null;

    function logMsg(message, type) {
        if (!type) type = 'info';
        var consoleDiv = document.getElementById('debug-console');
        if (!consoleDiv) return;
        var time = new Date().toTimeString().split(' ')[0];
        consoleDiv.innerHTML += '<div class="log-' + type + '">[' + time + '] ' + message + '</div>';
        consoleDiv.scrollTop = consoleDiv.scrollHeight;
    }

    var PROXY_LIST = [
        { name: "cors.x2u.in", url: function(u) { return 'https://cors.x2u.in/?' + encodeURIComponent(u); } },
        { name: "cors.lol", url: function(u) { return 'https://api.cors.lol/?url=' + encodeURIComponent(u); } },
        { name: "allorigins.win", url: function(u) { return 'https://api.allorigins.win/raw?url=' + encodeURIComponent(u); } },
        { name: "corsproxy.io", url: function(u) { return 'https://corsproxy.io/?' + encodeURIComponent(u); } },
        { name: "thingproxy", url: function(u) { return 'https://thingproxy.freeboard.io/fetch/' + u; } },
        { name: "codetabs", url: function(u) { return 'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(u); } }
    ];

    async function fetchWithFallbacks(targetUrl, contextName) {
        logMsg('Fetching ' + contextName + '...', "system");
        var lastError = "";

        for (var i = 0; i < PROXY_LIST.length; i++) {
            var proxy = PROXY_LIST[i];
            var proxyUrl = proxy.url(targetUrl);
            logMsg('Routing via [' + proxy.name + ']...', "info");
            
            try {
                var response = await fetch(proxyUrl, { headers: { 'Accept': 'application/json' }, cache: 'no-store' });
                if (!response.ok) {
                    throw new Error('HTTP ' + response.status);
                }
                
                var text = await response.text();
                if (text.trim().startsWith('<')) {
                    throw new Error("Returned HTML (Proxy likely blocked by Komoot)");
                }
                
                var data = JSON.parse(text);
                logMsg('Success! ' + contextName + ' loaded via ' + proxy.name, "success");
                return data;

            } catch (err) {
                logMsg('Proxy [' + proxy.name + '] failed: ' + err.message, "warning");
                lastError = err.message;
            }
        }
        throw new Error('All ' + PROXY_LIST.length + ' proxies failed. Last error: ' + lastError);
    }

    function renderMap(coords) {
        try {
            var mapDiv = document.getElementById('map-container');
            mapDiv.style.display = 'block';
            
            if (!map) {
                map = L.map('map-container');
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            }
            if (trackLayer) {
                map.removeLayer(trackLayer);
            }

            var latLngs = [];
            for (var i = 0; i < coords.length; i++) {
                latLngs.push([coords[i].lat, coords[i].lng]);
            }

            trackLayer = L.polyline(latLngs, { color: '#97b536', weight: 4 }).addTo(map);
            map.fitBounds(trackLayer.getBounds());
            
            setTimeout(function() { map.invalidateSize(); }, 300);
            logMsg("Map rendered successfully.", "success");
        } catch(e) {
            logMsg('Map Error: ' + e.message, "error");
        }
    }

    function generateGPX(name, items, distance) {
        var distKm = distance ? (distance / 1000).toFixed(2) + " km" : "Unknown length";
        logMsg('Compiling GPX File...', "info");
        logMsg('Track Info: ' + items.length + ' waypoints | ' + distKm, "system");
        
        var safeName = name.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        
        var lines = [];
        lines.push('<?xml version="1.0" encoding="UTF-8"?>');
        lines.push('<gpx version="1.1" creator="Komoot2GPX" xmlns="http://www.topografix.com/GPX/1/1">');
        lines.push('  <trk>');
        lines.push('    <name>' + safeName + '</name>');
        lines.push('    <trkseg>');

        for (var i = 0; i < items.length; i++) {
            var pt = items[i];
            lines.push('      <trkpt lat="' + pt.lat + '" lon="' + pt.lng + '">');
            if (pt.alt !== undefined) {
                lines.push('        <ele>' + pt.alt + '</ele>');
            }
            if (pt.t) {
                lines.push('        <time>' + new Date(pt.t).toISOString() + '</time>');
            }
            lines.push('      </trkpt>');
        }
        
        lines.push('    </trkseg>');
        lines.push('  </trk>');
        lines.push('</gpx>');

        var gpxString = lines.join(String.fromCharCode(10));

        try {
            var blob = new Blob([gpxString], { type: "application/gpx+xml" });
            var link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = name.replace(/[^a-z0-9äöüß]/gi, '_').toLowerCase() + '.gpx';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            logMsg("GPX Download triggered!", "success");
        } catch(e) {
            logMsg('Download Error: ' + e.message, "error");
        }
    }

    async function startExport() {
        var urlInput = document.getElementById('tourUrl').value.trim();
        var btn = document.getElementById('downloadBtn');
        var mapDiv = document.getElementById('map-container');
        var consoleDiv = document.getElementById('debug-console');
        
        consoleDiv.innerHTML = '<div class="log-system">=== NEW EXPORT STARTED ===</div>';
        mapDiv.style.display = 'none';

        if (!urlInput) {
            logMsg("Please enter a URL first!", "error");
            return;
        }

        btn.disabled = true;
        btn.innerText = "Processing...";

        try {
            logMsg('Input: ' + urlInput.substring(0, 45) + '...', "info");
            
            var tourId = "";
            var isSmartTour = false;

            if (urlInput.indexOf("/smarttour/") > -1) {
                isSmartTour = true;
                tourId = urlInput.split("/smarttour/")[1].split("?")[0].split("/")[0].split("#")[0];
            } else if (urlInput.indexOf("/tour/") > -1) {
                isSmartTour = false;
                tourId = urlInput.split("/tour/")[1].split("?")[0].split("/")[0].split("#")[0];
            }

            if (tourId === "") {
                throw new Error("No valid Tour-ID found in the URL.");
            }
            
            logMsg('Tour Type: ' + (isSmartTour ? 'Smarttour' : 'Standard Tour') + ' (ID: ' + tourId + ')', "success");
            
            var tourApiUrl = '';
            var coordsApiUrl = '';

            if (isSmartTour) {
                tourApiUrl = 'https://api.komoot.de/v007/discover_tours/' + tourId;
                coordsApiUrl = 'https://api.komoot.de/v007/smart_tours/' + tourId + '/coordinates';
            } else {
                tourApiUrl = 'https://api.komoot.de/v007/tours/' + tourId;
                coordsApiUrl = 'https://api.komoot.de/v007/tours/' + tourId + '/coordinates';
            }

            var tourData = await fetchWithFallbacks(tourApiUrl, "Metadata");
            var tourName = tourData.name || tourData.title || 'Komoot_Tour_' + tourId;
            var tourDistance = tourData.distance || 0;
            
            logMsg('Extracted Name: "' + tourName + '"', "info");

            var coordsData = await fetchWithFallbacks(coordsApiUrl, "Coordinates");
            if (!coordsData.items || coordsData.items.length === 0) {
                throw new Error("No GPS waypoints received.");
            }
            
            renderMap(coordsData.items);
            generateGPX(tourName, coordsData.items, tourDistance);
            
            logMsg("PROCESS COMPLETED SUCCESSFULLY", "success");
            btn.innerText = "Success!";
            
        } catch (error) {
            logMsg('ABORTED: ' + error.message, "error");
            btn.innerText = "Error!";
        } finally {
            setTimeout(function() { 
                btn.disabled = false; 
                btn.innerText = "Preview & Download GPX"; 
            }, 3000);
        }
    }

    document.addEventListener('DOMContentLoaded', function() {
        var btn = document.getElementById('downloadBtn');
        if (btn) {
            btn.addEventListener('click', startExport);
            logMsg("Engine loaded and button active.", "info");
        } else {
            logMsg("CRITICAL: Button not found in DOM!", "error");
        }

        // ==========================================
        // AUTO-START FÜR ANDROID "TEILEN"-MENÜ (BOMBENSICHER)
        // ==========================================
        try {
            var urlParams = new URLSearchParams(window.location.search);
            var sharedText = urlParams.get('text') || "";
            var sharedUrl = urlParams.get('url') || "";
            var combinedShare = sharedText + " " + sharedUrl;
            
            // Sichere Textsuche ohne Regex-Sonderzeichen
            var cleanUrl = "";
            var startIdx = combinedShare.indexOf("http");
            if (startIdx > -1) {
                var endIdx = combinedShare.indexOf(" ", startIdx);
                if (endIdx === -1) endIdx = combinedShare.length;
                cleanUrl = combinedShare.substring(startIdx, endIdx);
            }
            
            if (cleanUrl !== "" && (cleanUrl.indexOf("/tour/") > -1 || cleanUrl.indexOf("/smarttour/") > -1)) {
                logMsg("App über 'Teilen'-Menü geöffnet!", "system");
                
                var urlInput = document.getElementById('tourUrl');
                if (urlInput) {
                    urlInput.value = cleanUrl;
                    logMsg("URL automatisch eingefügt.", "success");
                    logMsg("Starte automatischen Download...", "info");
                    
                    setTimeout(function() {
                        startExport();
                    }, 1000);
                }
            }
        } catch(e) {
            logMsg("Auto-Start Fehler: " + e.message, "warning");
        }
    });

</script>
</body>
</html>
